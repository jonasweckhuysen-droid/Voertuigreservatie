<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Voertuigreservatie · Brandweer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --red:    #d42b2b;
    --red2:   #b01e1e;
    --dark:   #161a1d;
    --mid:    #2a2f35;
    --panel:  #1e2329;
    --border: #2f3740;
    --text:   #e8ecef;
    --muted:  #7a8694;
    --green:  #22c55e;
    --orange: #f97316;
    --blue:   #3b82f6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--dark);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh}

  /* ── topbar ── */
  .topbar{background:var(--red);padding:0 24px;display:flex;justify-content:space-between;align-items:stretch;height:58px}
  .topbar-left{display:flex;align-items:center;gap:14px}
  .logo{font-size:26px}
  .site-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;letter-spacing:.5px;line-height:1}
  .site-sub{font-size:11px;opacity:.75;letter-spacing:1px;text-transform:uppercase}
  .nav{display:flex;gap:2px;align-items:center}
  .nav-btn{padding:0 18px;height:100%;border:none;background:transparent;color:rgba(255,255,255,.75);font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;letter-spacing:.3px}
  .nav-btn:hover{color:#fff;background:rgba(255,255,255,.08)}
  .nav-btn.active{color:#fff;border-bottom-color:#fff;background:rgba(255,255,255,.12)}

  /* ── realtime dot ── */
  .rt-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 0 0 rgba(34,197,94,.4);animation:pulse 2s infinite;display:inline-block;margin-right:6px}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}70%{box-shadow:0 0 0 8px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}

  /* ── main layout ── */
  .main{max-width:1140px;margin:0 auto;padding:28px 18px}
  .two-col{display:grid;grid-template-columns:1.1fr 1fr;gap:20px}
  @media(max-width:760px){.two-col{grid-template-columns:1fr}}

  /* ── cards ── */
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:18px}
  .card-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:19px;letter-spacing:.4px;margin-bottom:18px;display:flex;align-items:center;gap:8px}

  /* ── form elements ── */
  label.lbl{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;margin-top:14px}
  input,select,textarea{width:100%;padding:9px 12px;border-radius:8px;border:1.5px solid var(--border);background:#12161a;color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border .15s}
  input:focus,select:focus{border-color:var(--red)}
  input[type=number]{-moz-appearance:textfield}
  .row{display:flex;gap:12px}
  .row>*{flex:1}

  /* ── vehicle selector ── */
  .vehicle-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px}
  .v-btn{background:#12161a;border:2px solid var(--border);border-radius:12px;padding:14px 8px;cursor:pointer;text-align:center;transition:all .15s;color:var(--text)}
  .v-btn:hover{border-color:#555}
  .v-btn.selected{border-color:var(--red);background:rgba(212,43,43,.1)}
  .v-icon{font-size:26px;display:block;margin-bottom:6px}
  .v-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px}
  .v-meta{color:var(--muted);font-size:11px;margin-top:3px}

  /* ── duration pills ── */
  .dur-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
  .dur-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#12161a;color:var(--muted);cursor:pointer;font-size:13px;font-family:'Barlow',sans-serif;transition:all .15s}
  .dur-btn.selected{background:var(--red);border-color:var(--red);color:#fff}

  /* ── availability box ── */
  .avail{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;border:1.5px solid;margin-top:14px;font-size:13px}
  .avail.ok{border-color:#22c55e;background:rgba(34,197,94,.08);color:#86efac}
  .avail.nok{border-color:#ef4444;background:rgba(239,68,68,.08);color:#fca5a5}

  /* ── submit button ── */
  .btn-primary{margin-top:16px;width:100%;padding:12px;border-radius:10px;border:none;background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:.5px;cursor:pointer;transition:background .15s}
  .btn-primary:hover{background:var(--red2)}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed}

  /* ── status pill ── */
  .pill{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid;display:inline-block}
  .pill.pending{border-color:var(--orange);color:var(--orange);background:rgba(249,115,22,.1)}
  .pill.approved{border-color:var(--green);color:var(--green);background:rgba(34,197,94,.1)}
  .pill.rejected{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.1)}

  /* ── request cards ── */
  .req-card{background:#12161a;border-radius:10px;padding:14px 16px;margin-bottom:10px;border-left:4px solid var(--border);transition:border-color .2s}
  .req-card.pending{border-left-color:var(--orange)}
  .req-card.approved{border-left-color:var(--green)}
  .req-card.rejected{border-left-color:#ef4444}
  .req-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .req-meta{display:grid;grid-template-columns:1fr 1fr;gap:3px 16px;font-size:12.5px;color:var(--muted)}
  .req-actions{display:flex;gap:8px;margin-top:12px}
  .btn-approve{flex:1;padding:8px;border-radius:8px;border:none;background:rgba(34,197,94,.15);color:#22c55e;font-family:'Barlow',sans-serif;font-weight:600;cursor:pointer;border:1.5px solid #22c55e;transition:background .15s;font-size:13px}
  .btn-approve:hover{background:rgba(34,197,94,.25)}
  .btn-reject{flex:1;padding:8px;border-radius:8px;border:none;background:rgba(239,68,68,.1);color:#ef4444;font-family:'Barlow',sans-serif;font-weight:600;cursor:pointer;border:1.5px solid #ef4444;transition:background .15s;font-size:13px}
  .btn-reject:hover{background:rgba(239,68,68,.2)}

  /* ── admin tabs ── */
  .admin-tabs{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
  .admin-tab{padding:8px 18px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'Barlow',sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all .15s}
  .admin-tab:hover{border-color:#555;color:var(--text)}
  .admin-tab.active{background:var(--red);border-color:var(--red);color:#fff}

  /* ── filter buttons ── */
  .filters{display:flex;gap:6px;flex-wrap:wrap}
  .filter-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Barlow',sans-serif;transition:all .15s}
  .filter-btn.active{background:var(--text);color:var(--dark);border-color:var(--text)}

  /* ── calendar ── */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-head{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:4px 0;text-transform:uppercase;letter-spacing:.5px}
  .cal-day{min-height:54px;border-radius:8px;border:1px solid var(--border);padding:5px;display:flex;flex-direction:column;align-items:center;transition:border-color .15s}
  .cal-day.has-events{border-color:#3b5268;background:rgba(59,130,246,.06);cursor:pointer}
  .cal-day.has-events:hover{border-color:var(--blue)}
  .cal-day.today{border-color:var(--red)!important}
  .cal-day .day-num{font-size:13px;font-weight:500}
  .cal-day.today .day-num{color:var(--red);font-weight:700}
  .cal-dot{background:var(--red);color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;margin-top:4px}
  .cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .cal-nav button{background:#12161a;border:1.5px solid var(--border);color:var(--text);border-radius:8px;padding:5px 14px;cursor:pointer;font-size:16px}
  .cal-detail{margin-top:14px;padding:14px;background:#12161a;border-radius:10px;border:1px solid var(--border)}
  .cal-event{padding:8px 0;border-bottom:1px solid var(--border);font-size:12.5px;line-height:1.7;color:var(--muted)}
  .cal-event strong{color:var(--text)}

  /* ── vehicle table ── */
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{padding:9px 12px;text-align:left;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  td{padding:10px 12px;border-bottom:1px solid #1a1f26;color:var(--text)}
  tr:last-child td{border-bottom:none}
  .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;transition:color .15s}
  .del-btn:hover{color:#ef4444}

  /* ── vehicle add form ── */
  .add-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .add-row input,.add-row select{flex:1 1 80px;min-width:60px}
  .btn-add{padding:9px 18px;border-radius:8px;border:none;background:var(--red);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;cursor:pointer;white-space:nowrap}

  /* ── notification ── */
  .notif{position:fixed;top:70px;right:20px;padding:12px 20px;border-radius:10px;border:1.5px solid;font-size:13px;font-weight:600;z-index:999;animation:slideIn .25s ease;max-width:320px}
  .notif.success{background:rgba(34,197,94,.15);border-color:#22c55e;color:#86efac}
  .notif.error{background:rgba(239,68,68,.12);border-color:#ef4444;color:#fca5a5}
  @keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}

  /* ── loading ── */
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:80vh;gap:16px;color:var(--muted)}
  .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .empty{color:var(--muted);text-align:center;padding:36px;font-size:14px}
  code{background:#12161a;padding:2px 6px;border-radius:4px;font-size:12px;color:var(--orange)}
</style>
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-left">
    <span class="logo">🚒</span>
    <div>
      <div class="site-title">Voertuigreservatie</div>
      <div class="site-sub"><span class="rt-dot" id="rtDot"></span>Live · Brandweer</div>
    </div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" id="btnUser" onclick="showView('user')">👤 Aanvraag</button>
    <button class="nav-btn" id="btnAdmin" onclick="showView('admin')">🔐 Beheerder</button>
  </nav>
</header>

<div id="notification" style="display:none" class="notif"></div>

<!-- VIEWS -->
<div class="main">
  <div id="loadingView" class="loading">
    <div class="spinner"></div>
    <span>Verbinding maken met database…</span>
  </div>

  <!-- USER VIEW -->
  <div id="userView" style="display:none">
    <div class="two-col">
      <!-- FORM -->
      <div class="card">
        <div class="card-title">📋 Nieuwe reservatie</div>

        <label class="lbl">Uw naam</label>
        <input id="fNaam" type="text" placeholder="Voornaam Achternaam"/>

        <label class="lbl">E-mailadres</label>
        <input id="fEmail" type="email" placeholder="naam@brandweer.be" oninput="loadMyRequests()"/>

        <label class="lbl">Voertuig</label>
        <div class="vehicle-grid" id="vehicleGrid"></div>

        <div class="row">
          <div>
            <label class="lbl">Datum</label>
            <input id="fDate" type="date" onchange="checkAvailability()"/>
          </div>
          <div>
            <label class="lbl">Vertrekuur</label>
            <input id="fTime" type="time" value="08:00" onchange="checkAvailability()"/>
          </div>
        </div>

        <label class="lbl">Tijdsduur</label>
        <div class="dur-grid" id="durGrid"></div>

        <div class="row" style="margin-top:14px">
          <div>
            <label class="lbl">Aantal personen</label>
            <input id="fPersons" type="number" min="1" value="1"/>
          </div>
          <div style="flex:2">
            <label class="lbl">Reden / bestemming</label>
            <input id="fReden" type="text" placeholder="bv. Opleiding Geel, inspectie…"/>
          </div>
        </div>

        <div id="availBox" style="display:none"></div>

        <button class="btn-primary" id="submitBtn" onclick="submitRequest()">📨 Aanvraag indienen</button>
      </div>

      <!-- MY REQUESTS -->
      <div class="card">
        <div class="card-title">📁 Mijn aanvragen</div>
        <div id="myRequests"><p class="empty">Vul uw e-mailadres in om uw aanvragen te zien.</p></div>
      </div>
    </div>
  </div>

  <!-- ADMIN VIEW -->
  <div id="adminView" style="display:none">
    <div class="admin-tabs">
      <button class="admin-tab active" onclick="showAdminTab('requests')">📋 Aanvragen</button>
      <button class="admin-tab" onclick="showAdminTab('calendar')">📅 Agenda</button>
      <button class="admin-tab" onclick="showAdminTab('vehicles')">🚗 Voertuigen</button>
    </div>

    <!-- REQUESTS TAB -->
    <div id="tab-requests" class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
        <div class="card-title" style="margin-bottom:0">📋 Reservatieaanvragen</div>
        <div class="filters">
          <button class="filter-btn active" onclick="setFilter('pending',this)">⏳ Wachtend <span id="cnt-pending"></span></button>
          <button class="filter-btn" onclick="setFilter('approved',this)">✅ Goedgekeurd</button>
          <button class="filter-btn" onclick="setFilter('rejected',this)">❌ Geweigerd</button>
          <button class="filter-btn" onclick="setFilter('all',this)">📋 Alles</button>
        </div>
      </div>
      <div id="requestsList"></div>
    </div>

    <!-- CALENDAR TAB -->
    <div id="tab-calendar" class="card" style="display:none">
      <div class="cal-nav">
        <button onclick="calNav(-1)">‹</button>
        <div class="card-title" style="margin-bottom:0" id="calTitle"></div>
        <button onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div id="calDetail" style="display:none" class="cal-detail"></div>
    </div>

    <!-- VEHICLES TAB -->
    <div id="tab-vehicles" class="card" style="display:none">
      <div class="card-title">🚗 Voertuigen beheren</div>
      <div class="add-row">
        <input id="vId"    type="text"   placeholder="ID (bv. S543)" style="max-width:110px"/>
        <input id="vName"  type="text"   placeholder="Naam (bv. S543 Transit)" style="flex:2"/>
        <input id="vSeats" type="number" placeholder="Zetels" style="max-width:80px" value="5"/>
        <select id="vType">
          <option>MPV</option><option>Bestelwagen</option><option>Bus</option><option>SUV</option><option>Pick-up</option>
        </select>
        <button class="btn-add" onclick="addVehicle()">+ Toevoegen</button>
      </div>
      <table>
        <thead><tr><th>ID</th><th>Naam</th><th>Zetels</th><th>Type</th><th></th></tr></thead>
        <tbody id="vehicleTable"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ── Supabase init ──────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://xcdrsenbvrxyjywkzgci.supabase.co';
const SUPABASE_KEY = 'sb_publishable_UCPiJ3V8A_x9rcWKisHTaA_zdHp9Nsv';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── State ──────────────────────────────────────────────────────────────────
let vehicles = [];
let requests = [];
let selectedVehicle = null;
let selectedDuration = 60;
let currentFilter = 'pending';
let calYear, calMonth;
const now = new Date();
calYear  = now.getFullYear();
calMonth = now.getMonth();

const DURATIONS = [
  {label:'30 min', value:30},
  {label:'1 uur',  value:60},
  {label:'2 uur',  value:120},
  {label:'4 uur',  value:240},
  {label:'Hele dag',value:480},
];

const MONTHS = ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'];
const DAYS   = ['Ma','Di','Wo','Do','Vr','Za','Zo'];

// ── Boot ───────────────────────────────────────────────────────────────────
(async function init() {
  await loadData();
  setupRealtime();
  renderDurations();
  setTodayDate();
  document.getElementById('loadingView').style.display = 'none';
  document.getElementById('userView').style.display = 'block';
})();

async function loadData() {
  const [vRes, rRes] = await Promise.all([
    sb.from('vehicles').select('*').order('id'),
    sb.from('requests').select('*').order('created_at', {ascending:false}),
  ]);
  vehicles = vRes.data || [];
  requests = rRes.data || [];
  renderVehicleGrid();
  renderRequests();
  renderVehicleTable();
}

// ── Realtime ───────────────────────────────────────────────────────────────
function setupRealtime() {
  sb.channel('db-changes')
    .on('postgres_changes', {event:'*', schema:'public', table:'vehicles'}, () => {
      loadData();
    })
    .on('postgres_changes', {event:'*', schema:'public', table:'requests'}, (payload) => {
      loadData();
      // notify user if their request got decided
      const r = payload.new;
      if (r && r.status !== 'pending') {
        const myEmail = document.getElementById('fEmail').value.trim();
        if (myEmail && r.email === myEmail) {
          notify(r.status === 'approved'
            ? `✅ Uw reservatie voor ${r.vehicle_name} op ${r.date} is goedgekeurd!`
            : `❌ Uw reservatie voor ${r.vehicle_name} op ${r.date} werd geweigerd.`,
            r.status === 'approved' ? 'success' : 'error');
        }
      }
    })
    .subscribe((status) => {
      document.getElementById('rtDot').style.background = status === 'SUBSCRIBED' ? '#22c55e' : '#f97316';
    });
}

// ── View switching ─────────────────────────────────────────────────────────
function showView(v) {
  document.getElementById('userView').style.display  = v==='user'  ? 'block':'none';
  document.getElementById('adminView').style.display = v==='admin' ? 'block':'none';
  document.getElementById('btnUser').classList.toggle('active', v==='user');
  document.getElementById('btnAdmin').classList.toggle('active', v==='admin');
  if (v==='admin') { renderRequests(); renderVehicleTable(); }
}

let activeAdminTab = 'requests';
function showAdminTab(tab) {
  ['requests','calendar','vehicles'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? 'block':'none';
  });
  document.querySelectorAll('.admin-tab').forEach((b,i) => {
    b.classList.toggle('active', ['requests','calendar','vehicles'][i]===tab);
  });
  activeAdminTab = tab;
  if (tab==='calendar') renderCalendar();
}

// ── Vehicle grid (user) ────────────────────────────────────────────────────
function renderVehicleGrid() {
  const grid = document.getElementById('vehicleGrid');
  grid.innerHTML = vehicles.map(v => {
    const icon = v.type==='Bus'?'🚌':v.type==='Bestelwagen'?'🚐':'🚗';
    const sel  = selectedVehicle===v.id ? 'selected':'';
    return `<button class="v-btn ${sel}" onclick="selectVehicle('${v.id}')">
      <span class="v-icon">${icon}</span>
      <div class="v-name">${v.name}</div>
      <div class="v-meta">${v.seats} pers. · ${v.type}</div>
    </button>`;
  }).join('');
}

function selectVehicle(id) {
  selectedVehicle = id;
  renderVehicleGrid();
  checkAvailability();
}

// ── Durations ──────────────────────────────────────────────────────────────
function renderDurations() {
  document.getElementById('durGrid').innerHTML = DURATIONS.map(d =>
    `<button class="dur-btn ${d.value===selectedDuration?'selected':''}" onclick="selectDuration(${d.value})">${d.label}</button>`
  ).join('');
}

function selectDuration(v) {
  selectedDuration = v;
  renderDurations();
  checkAvailability();
}

// ── Date default ───────────────────────────────────────────────────────────
function setTodayDate() {
  const t = new Date();
  document.getElementById('fDate').value = fmtDate(t);
  document.getElementById('fDate').min   = fmtDate(t);
}

// ── Availability check ─────────────────────────────────────────────────────
function checkAvailability() {
  const box = document.getElementById('availBox');
  if (!selectedVehicle) { box.style.display='none'; return; }
  const date = document.getElementById('fDate').value;
  const time = document.getElementById('fTime').value;
  if (!date||!time) { box.style.display='none'; return; }

  const approved = requests.filter(r => r.vehicle_id===selectedVehicle && r.status==='approved');
  const clash = approved.find(r => overlaps(
    {date, time, duration:selectedDuration},
    {date:r.date, time:r.time, duration:r.duration}
  ));

  box.style.display = 'flex';
  if (clash) {
    const dur = DURATIONS.find(d=>d.value===clash.duration);
    box.className = 'avail nok';
    box.innerHTML = `❌ <div><strong>Niet beschikbaar</strong> — gereserveerd door ${clash.naam} van ${clash.time} (${dur?dur.label:clash.duration+' min'})</div>`;
    document.getElementById('submitBtn').disabled = true;
  } else {
    box.className = 'avail ok';
    box.innerHTML = `✅ <div><strong>Beschikbaar</strong> op ${date} om ${time}</div>`;
    document.getElementById('submitBtn').disabled = false;
  }
}

// ── Submit request ─────────────────────────────────────────────────────────
async function submitRequest() {
  const naam  = document.getElementById('fNaam').value.trim();
  const email = document.getElementById('fEmail').value.trim();
  const date  = document.getElementById('fDate').value;
  const time  = document.getElementById('fTime').value;
  const persons = +document.getElementById('fPersons').value;
  const reden = document.getElementById('fReden').value.trim();

  if (!naam||!email||!selectedVehicle||!date||!time||!reden) {
    notify('Vul alle velden in.','error'); return;
  }

  const vehicle = vehicles.find(v=>v.id===selectedVehicle);
  const id = 'REQ-'+Date.now();

  const {error} = await sb.from('requests').insert({
    id, vehicle_id:selectedVehicle, vehicle_name:vehicle?.name||selectedVehicle,
    naam, email, date, time, duration:selectedDuration,
    persons, reden, status:'pending',
  });

  if (error) { notify('Fout bij indienen: '+error.message,'error'); return; }
  notify('Aanvraag ingediend! De beheerder wordt verwittigd.');
  document.getElementById('fReden').value='';
  loadMyRequests();
}

// ── My requests (user side) ────────────────────────────────────────────────
function loadMyRequests() {
  const email = document.getElementById('fEmail').value.trim();
  const container = document.getElementById('myRequests');
  if (!email) { container.innerHTML='<p class="empty">Vul uw e-mailadres in om uw aanvragen te zien.</p>'; return; }
  const mine = requests.filter(r=>r.email===email).slice(0,15);
  if (!mine.length) { container.innerHTML='<p class="empty">Nog geen aanvragen gevonden voor dit e-mailadres.</p>'; return; }
  container.innerHTML = mine.map(r => reqCardHTML(r, false)).join('');
}

// ── Requests list (admin) ──────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderRequests();
}

function renderRequests() {
  const pending = requests.filter(r=>r.status==='pending');
  const el = document.getElementById('cnt-pending');
  if (el) el.textContent = pending.length ? `(${pending.length})`:'';

  const filtered = currentFilter==='all' ? requests : requests.filter(r=>r.status===currentFilter);
  const list = document.getElementById('requestsList');
  if (!list) return;
  list.innerHTML = filtered.length
    ? filtered.map(r=>reqCardHTML(r,true)).join('')
    : '<p class="empty">Geen aanvragen gevonden.</p>';
}

function reqCardHTML(r, isAdmin) {
  const dur = DURATIONS.find(d=>d.value===r.duration);
  return `<div class="req-card ${r.status}">
    <div class="req-top">
      <strong style="font-family:'Barlow Condensed',sans-serif;font-size:16px">${r.vehicle_name}</strong>
      <span class="pill ${r.status}">${r.status==='pending'?'⏳ Wachtend':r.status==='approved'?'✅ Goedgekeurd':'❌ Geweigerd'}</span>
    </div>
    <div class="req-meta">
      <span>👤 ${r.naam}</span><span>📧 ${r.email}</span>
      <span>📅 ${r.date}</span><span>🕐 ${r.time} · ${dur?dur.label:r.duration+' min'}</span>
      <span>👥 ${r.persons} personen</span><span>📍 ${r.reden}</span>
    </div>
    ${isAdmin && r.status==='pending' ? `
    <div class="req-actions">
      <button class="btn-approve" onclick="decide('${r.id}','approved')">✅ Goedkeuren</button>
      <button class="btn-reject"  onclick="decide('${r.id}','rejected')">❌ Weigeren</button>
    </div>` : ''}
  </div>`;
}

async function decide(id, status) {
  const {error} = await sb.from('requests').update({status, decided_at:new Date().toISOString()}).eq('id',id);
  if (error) { notify('Fout: '+error.message,'error'); return; }
  notify(status==='approved' ? '✅ Aanvraag goedgekeurd en in de agenda gezet.' : '❌ Aanvraag geweigerd.');
}

// ── Calendar ───────────────────────────────────────────────────────────────
function calNav(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth=0; calYear++; }
  if (calMonth < 0)  { calMonth=11; calYear--; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('calTitle').textContent = `${MONTHS[calMonth]} ${calYear}`;
  const days   = new Date(calYear, calMonth+1, 0).getDate();
  const start  = new Date(calYear, calMonth, 1).getDay();
  const offset = start===0 ? 6 : start-1;
  const approved = requests.filter(r=>r.status==='approved');
  const todayStr = fmtDate(new Date());

  let html = DAYS.map(d=>`<div class="cal-head">${d}</div>`).join('');
  html += Array.from({length:offset}, ()=>'<div></div>').join('');

  for (let d=1; d<=days; d++) {
    const dateStr = `${calYear}-${pad(calMonth+1)}-${pad(d)}`;
    const evs = approved.filter(r=>r.date===dateStr);
    const isToday = dateStr===todayStr;
    html += `<div class="cal-day${evs.length?' has-events':''}${isToday?' today':''}" 
      ${evs.length?`onclick="showCalDay('${dateStr}',${JSON.stringify(evs).replace(/"/g,'&quot;')})"`:''}>
      <span class="day-num">${d}</span>
      ${evs.length?`<div class="cal-dot">${evs.length}</div>`:''}
    </div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
  document.getElementById('calDetail').style.display='none';
}

function showCalDay(dateStr, evs) {
  const box = document.getElementById('calDetail');
  const dur = (v) => { const d=DURATIONS.find(d=>d.value===v); return d?d.label:v+' min'; };
  box.style.display='block';
  box.innerHTML = `<div style="display:flex;justify-content:space-between;margin-bottom:10px">
    <strong>${dateStr}</strong>
    <button onclick="document.getElementById('calDetail').style.display='none'" 
      style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px">✕</button>
  </div>`
    + evs.map(r=>`<div class="cal-event">
      <strong>${r.vehicle_name}</strong> · ${r.time} (${dur(r.duration)})<br/>
      👤 ${r.naam} · 👥 ${r.persons} pers. · 📍 ${r.reden}
    </div>`).join('');
}

// ── Vehicle manager ────────────────────────────────────────────────────────
function renderVehicleTable() {
  const tb = document.getElementById('vehicleTable');
  if (!tb) return;
  tb.innerHTML = vehicles.map(v=>`<tr>
    <td><code>${v.id}</code></td>
    <td>${v.name}</td>
    <td>${v.seats}</td>
    <td>${v.type}</td>
    <td><button class="del-btn" onclick="deleteVehicle('${v.id}')">🗑</button></td>
  </tr>`).join('');
}

async function addVehicle() {
  const id    = document.getElementById('vId').value.trim().toUpperCase();
  const name  = document.getElementById('vName').value.trim();
  const seats = +document.getElementById('vSeats').value;
  const type  = document.getElementById('vType').value;
  if (!id||!name||!seats) { notify('Vul alle velden in.','error'); return; }
  if (vehicles.find(v=>v.id===id)) { notify('Dit ID bestaat al.','error'); return; }
  const {error} = await sb.from('vehicles').insert({id,name,seats,type});
  if (error) { notify('Fout: '+error.message,'error'); return; }
  document.getElementById('vId').value='';
  document.getElementById('vName').value='';
  notify('Voertuig toegevoegd!');
}

async function deleteVehicle(id) {
  if (!confirm(`Voertuig ${id} verwijderen?`)) return;
  const {error} = await sb.from('vehicles').delete().eq('id',id);
  if (error) { notify('Fout: '+error.message,'error'); return; }
  notify('Voertuig verwijderd.');
}

// ── Helpers ────────────────────────────────────────────────────────────────
function overlaps(a, b) {
  const toMins = (date, time) => {
    const [h,m] = time.split(':').map(Number);
    const [yr,mo,dy] = date.split('-').map(Number);
    return new Date(yr,mo-1,dy).getTime()/60000 + h*60 + m;
  };
  const aS=toMins(a.date,a.time), aE=aS+a.duration;
  const bS=toMins(b.date,b.time), bE=bS+b.duration;
  return aS<bE && bS<aE;
}

function pad(n){return String(n).padStart(2,'0')}
function fmtDate(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`}

let notifTimer;
function notify(msg, type='success') {
  const el = document.getElementById('notification');
  el.textContent = msg;
  el.className = `notif ${type}`;
  el.style.display = 'block';
  clearTimeout(notifTimer);
  notifTimer = setTimeout(()=>el.style.display='none', 4500);
}
</script>
