<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Brandweer Voertuigreservatie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --red:#d42b2b; --red2:#b61f1f;
  --dark:#171b20; --panel:#20262d; --border:#313942;
  --text:#edf1f4; --muted:#8a97a5;
  --green:#22c55e; --orange:#f97316; --blue:#3b82f6;
}
*{ margin:0; padding:0; box-sizing:border-box; }
body{ background:var(--dark); color:var(--text); font-family:'Barlow',sans-serif; min-height:100vh; }

/* ── topbar ── */
.topbar{ background:var(--red); padding:14px 20px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
.top-left{ display:flex; align-items:center; gap:12px; }
.logo{ font-size:32px; }
.site-title{ font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:800; }
.site-sub{ font-size:12px; text-transform:uppercase; opacity:.8; letter-spacing:1px; }
.nav{ display:flex; gap:8px; }
.nav button{ border:none; background:rgba(255,255,255,.15); color:white; padding:10px 18px; border-radius:10px; cursor:pointer; font-weight:700; font-family:'Barlow',sans-serif; font-size:14px; transition:all .15s; }
.nav button.active{ background:white; color:var(--red); }
.nav button:hover:not(.active){ background:rgba(255,255,255,.25); }

/* ── layout ── */
.main{ max-width:1400px; margin:auto; padding:20px; }
.grid{ display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.card{ background:var(--panel); border:1px solid var(--border); border-radius:16px; padding:22px; }
.card-title{ font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:700; margin-bottom:18px; }

/* ── form ── */
label{ display:block; margin-top:14px; margin-bottom:5px; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; font-weight:700; }
input, select{ width:100%; background:#14181d; border:1.5px solid var(--border); border-radius:10px; padding:10px 12px; color:var(--text); font-family:'Barlow',sans-serif; font-size:14px; min-height:44px; outline:none; transition:border .15s; }
input:focus, select:focus{ border-color:var(--red); }
.row{ display:flex; gap:12px; }
.row>*{ flex:1; }

/* ── vehicle buttons ── */
.vehicle-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:8px; }
.v-btn{ background:#14181d; border:2px solid var(--border); border-radius:12px; padding:14px; cursor:pointer; text-align:left; color:var(--text); width:100%; transition:all .15s; }
.v-btn:hover{ border-color:#4a5568; }
.v-btn.selected{ border-color:var(--red); background:rgba(212,43,43,.12); }
.v-title{ font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; }
.v-meta{ font-size:13px; color:var(--muted); margin-top:4px; }

/* ── avail indicator ── */
.avail-ok{ background:rgba(34,197,94,.1); border:1.5px solid #22c55e; color:#86efac; border-radius:10px; padding:10px 14px; margin-top:12px; font-size:13px; font-weight:600; }
.avail-nok{ background:rgba(239,68,68,.1); border:1.5px solid #ef4444; color:#fca5a5; border-radius:10px; padding:10px 14px; margin-top:12px; font-size:13px; font-weight:600; }

/* ── buttons ── */
.btn-primary{ width:100%; border:none; border-radius:10px; background:var(--red); color:white; font-weight:700; cursor:pointer; margin-top:18px; font-size:16px; min-height:46px; font-family:'Barlow',sans-serif; transition:background .15s; }
.btn-primary:hover{ background:var(--red2); }
.btn-primary:disabled{ opacity:.4; cursor:not-allowed; }

/* ── status pills ── */
.status{ padding:4px 10px; border-radius:20px; font-size:12px; font-weight:700; display:inline-block; white-space:nowrap; }
.status.pending{ background:rgba(249,115,22,.15); color:var(--orange); }
.status.approved{ background:rgba(34,197,94,.15); color:var(--green); }
.status.rejected{ background:rgba(239,68,68,.15); color:#ef4444; }

/* ── request cards ── */
.req-card{ background:#14181d; border-radius:12px; padding:16px; margin-bottom:14px; border-left:4px solid var(--border); }
.req-card.pending{ border-left-color:var(--orange); }
.req-card.approved{ border-left-color:var(--green); }
.req-card.rejected{ border-left-color:#ef4444; }
.req-top{ display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
.req-name{ font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; }
.req-meta{ display:grid; grid-template-columns:1fr 1fr; gap:6px 14px; color:var(--muted); font-size:13px; }
.req-actions{ display:flex; gap:10px; margin-top:14px; }
.btn-ok{ flex:1; border:1.5px solid var(--green); border-radius:10px; background:rgba(34,197,94,.1); color:var(--green); cursor:pointer; font-weight:700; min-height:42px; font-family:'Barlow',sans-serif; font-size:14px; transition:background .15s; }
.btn-ok:hover{ background:rgba(34,197,94,.22); }
.btn-no{ flex:1; border:1.5px solid #ef4444; border-radius:10px; background:rgba(239,68,68,.1); color:#ef4444; cursor:pointer; font-weight:700; min-height:42px; font-family:'Barlow',sans-serif; font-size:14px; transition:background .15s; }
.btn-no:hover{ background:rgba(239,68,68,.22); }

/* ── passengers block ── */
.pax-block{ margin-top:12px; background:rgba(59,130,246,.08); border:1px solid rgba(59,130,246,.25); color:#93c5fd; border-radius:10px; padding:12px 14px; font-size:13px; line-height:1.7; }
.pax-block .pax-title{ font-weight:700; margin-bottom:4px; }
.pax-free{ color:var(--green); font-weight:700; }
.pax-full{ color:#ef4444; font-weight:700; }

/* ── event cards ── */
.event{ background:#14181d; border-radius:12px; padding:16px; margin-bottom:14px; border-left:4px solid var(--green); }
.event-top{ display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:12px; flex-wrap:wrap; }
.event-title{ font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; }
.event-meta{ display:grid; grid-template-columns:1fr 1fr; gap:6px 14px; color:var(--muted); font-size:13px; }

/* ── admin tabs ── */
.tabs{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px; }
.tabs button{ border:none; border-radius:10px; padding:10px 18px; cursor:pointer; background:#14181d; color:var(--muted); font-weight:700; font-family:'Barlow',sans-serif; font-size:14px; transition:all .15s; min-height:42px; }
.tabs button:hover{ color:var(--text); }
.tabs button.active{ background:var(--red); color:white; }
.tabs-filter{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.filter-btn{ border:1.5px solid var(--border); border-radius:20px; padding:6px 14px; cursor:pointer; background:transparent; color:var(--muted); font-size:13px; font-family:'Barlow',sans-serif; font-weight:600; transition:all .15s; }
.filter-btn.active{ background:var(--text); color:var(--dark); border-color:var(--text); }

/* ── vehicle table ── */
table{ width:100%; border-collapse:collapse; font-size:14px; }
th{ padding:9px 12px; text-align:left; color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.6px; border-bottom:1px solid var(--border); }
td{ padding:10px 12px; border-bottom:1px solid #1c2128; }
tr:last-child td{ border-bottom:none; }
.del-btn{ background:none; border:none; color:var(--muted); cursor:pointer; font-size:15px; transition:color .15s; }
.del-btn:hover{ color:#ef4444; }

/* ── notification ── */
.notif{ position:fixed; top:16px; right:16px; z-index:999; padding:14px 20px; border-radius:12px; font-weight:700; font-size:14px; max-width:320px; line-height:1.4; box-shadow:0 4px 20px rgba(0,0,0,.4); }
.notif.success{ background:#14532d; border:1px solid #22c55e; color:#dcfce7; }
.notif.error{ background:#450a0a; border:1px solid #ef4444; color:#fecaca; }
.notif.info{ background:#1e3a5f; border:1px solid #3b82f6; color:#bfdbfe; }

/* ── MODAL ── */
.modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:500; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(6px); animation:fadeIn .2s ease; }
@keyframes fadeIn{ from{opacity:0} to{opacity:1} }
.modal{ background:var(--panel); border:1px solid var(--border); border-radius:20px; padding:36px 32px; width:100%; max-width:380px; box-shadow:0 24px 64px rgba(0,0,0,.6); animation:slideUp .25s ease; text-align:center; }
@keyframes slideUp{ from{transform:translateY(24px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-icon{ font-size:48px; margin-bottom:14px; }
.modal-title{ font-family:'Barlow Condensed',sans-serif; font-size:26px; font-weight:800; margin-bottom:6px; }
.modal-sub{ color:var(--muted); font-size:14px; margin-bottom:24px; }
.modal input{ text-align:center; font-size:22px; letter-spacing:6px; padding:14px; border-radius:12px; background:#14181d; border:2px solid var(--border); color:var(--text); width:100%; font-family:'Barlow',sans-serif; transition:border .15s; }
.modal input:focus{ border-color:var(--red); }
.modal-error{ color:#fca5a5; font-size:13px; min-height:20px; margin-top:8px; font-weight:600; }
.modal-actions{ display:flex; flex-direction:column; gap:10px; margin-top:20px; }
.modal .btn-login{ border:none; border-radius:12px; background:var(--red); color:white; font-weight:700; font-size:16px; cursor:pointer; padding:14px; font-family:'Barlow',sans-serif; transition:background .15s; }
.modal .btn-login:hover{ background:var(--red2); }
.modal .btn-cancel{ border:1.5px solid var(--border); border-radius:12px; background:transparent; color:var(--muted); font-weight:600; font-size:14px; cursor:pointer; padding:12px; font-family:'Barlow',sans-serif; transition:all .15s; }
.modal .btn-cancel:hover{ border-color:#555; color:var(--text); }

/* ── carpool modal ── */
.modal-join input{ font-size:16px; letter-spacing:0; text-align:left; }

/* ── empty states ── */
.empty{ color:var(--muted); font-size:14px; padding:24px 0; text-align:center; }

/* ── responsive ── */
@media(max-width:900px){ .grid{ grid-template-columns:1fr; } }
@media(max-width:600px){ .row{ flex-direction:column; } .vehicle-grid{ grid-template-columns:1fr; } .req-meta,.event-meta{ grid-template-columns:1fr; } }
</style>
</head>
<body>

<header class="topbar">
  <div class="top-left">
    <div class="logo">🚒</div>
    <div>
      <div class="site-title">Voertuigreservatie</div>
      <div class="site-sub">Brandweer</div>
    </div>
  </div>
  <div class="nav">
    <button class="active" id="btnUser" onclick="showView('user')">👤 Reservatie</button>
    <button id="btnAdmin" onclick="openAdminLogin()">🔐 Beheer</button>
  </div>
</header>

<div id="notification" style="display:none" class="notif"></div>

<!-- ADMIN LOGIN MODAL -->
<div class="modal-overlay" id="loginModal" style="display:none" onclick="if(event.target===this)closeLoginModal()">
  <div class="modal">
    <div class="modal-icon">🔒</div>
    <div class="modal-title">Beheerderstoegang</div>
    <div class="modal-sub">Voer de toegangscode in om door te gaan</div>
    <input type="password" id="adminPwInput" placeholder="••••" maxlength="20"
      onkeydown="if(event.key==='Enter')doAdminLogin()"/>
    <div class="modal-error" id="loginError"></div>
    <div class="modal-actions">
      <button class="btn-login" onclick="doAdminLogin()">🔓 Inloggen</button>
      <button class="btn-cancel" onclick="closeLoginModal()">Annuleren</button>
    </div>
  </div>
</div>

<!-- CARPOOL JOIN MODAL -->
<div class="modal-overlay modal-join" id="carpoolModal" style="display:none" onclick="if(event.target===this)closeCarpoolModal()">
  <div class="modal">
    <div class="modal-icon">🚗</div>
    <div class="modal-title">Meerijden</div>
    <div class="modal-sub" id="carpoolSubtitle">Voer uw naam in om u aan te melden</div>
    <input type="text" id="carpoolName" placeholder="Voornaam Achternaam"
      onkeydown="if(event.key==='Enter')confirmCarpool()"/>
    <div class="modal-error" id="carpoolError"></div>
    <div class="modal-actions">
      <button class="btn-login" onclick="confirmCarpool()">✅ Bevestigen</button>
      <button class="btn-cancel" onclick="closeCarpoolModal()">Annuleren</button>
    </div>
  </div>
</div>

<div class="main">

  <!-- USER VIEW -->
  <div id="userView">
    <div class="grid">

      <!-- FORM -->
      <div class="card">
        <div class="card-title">📋 Nieuwe reservatie</div>

        <label>Naam</label>
        <input id="fNaam" type="text" placeholder="Voornaam Achternaam"/>

        <label>E-mailadres</label>
        <input id="fEmail" type="email" placeholder="naam@brandweer.be" oninput="renderMyRequests()"/>

        <label>Voertuig</label>
        <div class="vehicle-grid" id="vehicleGrid"></div>

        <div id="availBox"></div>

        <div class="row">
          <div>
            <label>Datum</label>
            <input id="fDate" type="date" onchange="checkAvail()"/>
          </div>
          <div>
            <label>Vertrek</label>
            <input id="fStart" type="time" value="08:00" onchange="checkAvail()"/>
          </div>
          <div>
            <label>Aankomst</label>
            <input id="fEnd" type="time" value="12:00" onchange="checkAvail()"/>
          </div>
        </div>

        <div class="row">
          <div>
            <label>Aantal personen</label>
            <input id="fPersons" type="number" min="1" value="1"/>
          </div>
          <div style="flex:2">
            <label>Reden / bestemming</label>
            <input id="fReason" type="text" placeholder="bv. Opleiding Geel…"/>
          </div>
        </div>

        <button class="btn-primary" id="submitBtn" onclick="submitRequest()">
          📨 Reservatie aanvragen
        </button>
      </div>

      <!-- MY REQUESTS -->
      <div class="card">
        <div class="card-title">📁 Mijn aanvragen</div>
        <div id="myRequests"><p class="empty">Vul uw e-mail in om uw aanvragen te zien.</p></div>
      </div>
    </div>

    <!-- PUBLIC CALENDAR -->
    <div class="card" style="margin-top:20px">
      <div class="card-title">📅 Publieke agenda &amp; carpooling</div>
      <div id="publicCalendar"></div>
    </div>
  </div>

  <!-- ADMIN VIEW -->
  <div id="adminView" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:18px">
      <div class="tabs" style="margin-bottom:0">
        <button class="active" id="tabBtnRequests" onclick="showTab('requests',this)">📋 Aanvragen</button>
        <button id="tabBtnVehicles" onclick="showTab('vehicles',this)">🚗 Voertuigen</button>
      </div>
      <button onclick="doAdminLogout()" style="border:1.5px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);padding:10px 16px;cursor:pointer;font-family:'Barlow',sans-serif;font-weight:600;font-size:14px">
        🚪 Uitloggen
      </button>
    </div>

    <!-- REQUESTS TAB -->
    <div id="tab-requests">
      <div class="tabs-filter">
        <button class="filter-btn active" onclick="setFilter('pending',this)">⏳ Wachtend <span id="pendingBadge"></span></button>
        <button class="filter-btn" onclick="setFilter('approved',this)">✅ Goedgekeurd</button>
        <button class="filter-btn" onclick="setFilter('rejected',this)">❌ Geweigerd</button>
        <button class="filter-btn" onclick="setFilter('all',this)">📋 Alles</button>
      </div>
      <div id="adminRequests"></div>
    </div>

    <!-- VEHICLES TAB -->
    <div id="tab-vehicles" style="display:none">
      <div class="card">
        <div class="card-title">🚗 Voertuig toevoegen</div>
        <div class="row" style="flex-wrap:wrap">
          <input id="vId"    type="text"   placeholder="ID (bv. S543)" style="flex:0 1 100px;min-width:80px"/>
          <input id="vName"  type="text"   placeholder="Naam (bv. S543 Transit)" style="flex:2"/>
          <input id="vSeats" type="number" value="5" style="flex:0 1 80px;min-width:70px"/>
          <select id="vType" style="flex:1;min-width:120px">
            <option>MPV</option><option>Bus</option><option>Bestelwagen</option><option>SUV</option><option>Pick-up</option>
          </select>
        </div>
        <button class="btn-primary" onclick="addVehicle()">+ Voertuig toevoegen</button>

        <div style="margin-top:24px">
          <table>
            <thead><tr><th>ID</th><th>Naam</th><th>Zetels</th><th>Type</th><th></th></tr></thead>
            <tbody id="vehicleTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</div><!-- /main -->

<script>
// ── Supabase ───────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://xcdrsenbvrxyjywkzgci.supabase.co';
const SUPABASE_KEY = 'sb_publishable_UCPiJ3V8A_x9rcWKisHTaA_zdHp9Nsv';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── Config ─────────────────────────────────────────────────────────────────
// Wijzig dit wachtwoord naar wens — of sla het later op in Supabase settings
const ADMIN_CODE = '2200';

// ── State ──────────────────────────────────────────────────────────────────
let vehicles = [], requests = [];
let selectedVehicle = null;
let isAdmin = false;
let currentFilter = 'pending';
let carpoolTargetId = null;

// ── Boot ───────────────────────────────────────────────────────────────────
(async function () {
  setToday();
  await loadData();
  setupRealtime();
})();

async function loadData() {
  const [vR, rR] = await Promise.all([
    sb.from('vehicles').select('*').order('id'),
    sb.from('requests').select('*').order('created_at', { ascending: false }),
  ]);
  vehicles = vR.data || [];
  requests = rR.data || [];
  renderVehicles();
  renderMyRequests();
  renderAdminRequests();
  renderCalendar();
  renderVehicleTable();
  updatePendingBadge();
}

function setupRealtime() {
  sb.channel('live')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'requests' }, loadData)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'vehicles' }, loadData)
    .subscribe();
}

// ── Views ──────────────────────────────────────────────────────────────────
function showView(v) {
  document.getElementById('userView').style.display  = v === 'user'  ? 'block' : 'none';
  document.getElementById('adminView').style.display = v === 'admin' ? 'block' : 'none';
  document.getElementById('btnUser').classList.toggle('active', v === 'user');
  document.getElementById('btnAdmin').classList.toggle('active', v === 'admin');
}

function showTab(tab, btn) {
  document.getElementById('tab-requests').style.display = tab === 'requests' ? 'block' : 'none';
  document.getElementById('tab-vehicles').style.display = tab === 'vehicles' ? 'block' : 'none';
  document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Admin login modal ──────────────────────────────────────────────────────
function openAdminLogin() {
  if (isAdmin) { showView('admin'); return; }
  document.getElementById('adminPwInput').value = '';
  document.getElementById('loginError').textContent = '';
  document.getElementById('loginModal').style.display = 'flex';
  setTimeout(() => document.getElementById('adminPwInput').focus(), 80);
}

function closeLoginModal() {
  document.getElementById('loginModal').style.display = 'none';
}

function doAdminLogin() {
  const val = document.getElementById('adminPwInput').value;
  if (val === ADMIN_CODE) {
    isAdmin = true;
    closeLoginModal();
    showView('admin');
    notify('Welkom, beheerder!', 'info');
  } else {
    document.getElementById('loginError').textContent = '❌ Foute code, probeer opnieuw.';
    document.getElementById('adminPwInput').value = '';
    document.getElementById('adminPwInput').focus();
  }
}

function doAdminLogout() {
  isAdmin = false;
  showView('user');
  notify('Uitgelogd.', 'info');
}

// ── Vehicles ───────────────────────────────────────────────────────────────
function renderVehicles() {
  const icons = { Bus: '🚌', Bestelwagen: '🚐', MPV: '🚗', SUV: '🚙', 'Pick-up': '🛻' };
  document.getElementById('vehicleGrid').innerHTML = vehicles.map(v => `
    <button class="v-btn ${selectedVehicle === v.id ? 'selected' : ''}" onclick="selectVehicle('${v.id}')">
      <div class="v-title">${icons[v.type] || '🚗'} ${v.name}</div>
      <div class="v-meta">${v.seats} plaatsen · ${v.type}</div>
    </button>
  `).join('') || '<p class="empty">Geen voertuigen beschikbaar.</p>';
}

function selectVehicle(id) {
  selectedVehicle = id;
  renderVehicles();
  checkAvail();
}

function renderVehicleTable() {
  const tb = document.getElementById('vehicleTable');
  if (!tb) return;
  tb.innerHTML = vehicles.map(v => `
    <tr>
      <td><code style="background:#14181d;padding:2px 7px;border-radius:5px;font-size:12px;color:var(--orange)">${v.id}</code></td>
      <td>${v.name}</td><td>${v.seats}</td><td>${v.type}</td>
      <td><button class="del-btn" onclick="deleteVehicle('${v.id}')" title="Verwijderen">🗑</button></td>
    </tr>
  `).join('') || '<tr><td colspan="5" class="empty">Geen voertuigen.</td></tr>';
}

async function addVehicle() {
  const id    = document.getElementById('vId').value.trim().toUpperCase();
  const name  = document.getElementById('vName').value.trim();
  const seats = +document.getElementById('vSeats').value;
  const type  = document.getElementById('vType').value;
  if (!id || !name || !seats) { notify('Vul alle velden in', 'error'); return; }
  if (vehicles.find(v => v.id === id)) { notify('Dit ID bestaat al', 'error'); return; }
  const { error } = await sb.from('vehicles').insert({ id, name, seats, type });
  if (error) { notify(error.message, 'error'); return; }
  document.getElementById('vId').value = '';
  document.getElementById('vName').value = '';
  notify('Voertuig toegevoegd');
}

async function deleteVehicle(id) {
  if (!confirm(`Voertuig ${id} verwijderen?`)) return;
  const { error } = await sb.from('vehicles').delete().eq('id', id);
  if (error) { notify(error.message, 'error'); return; }
  notify('Voertuig verwijderd');
}

// ── Availability check ─────────────────────────────────────────────────────
function checkAvail() {
  const box   = document.getElementById('availBox');
  const date  = document.getElementById('fDate').value;
  const start = document.getElementById('fStart').value;
  const end   = document.getElementById('fEnd').value;
  const btn   = document.getElementById('submitBtn');

  if (!selectedVehicle || !date || !start || !end || start >= end) {
    box.innerHTML = '';
    btn.disabled = false;
    return;
  }

  // Only approved reservations block a vehicle
  const clash = requests.find(r =>
    r.vehicle_id === selectedVehicle &&
    r.date === date &&
    r.status === 'approved' &&
    timeOverlaps(start, end, r.start_time, r.end_time)
  );

  if (clash) {
    box.innerHTML = `<div class="avail-nok">❌ Niet beschikbaar — al gereserveerd door <strong>${clash.naam}</strong> van ${clash.start_time} tot ${clash.end_time}</div>`;
    btn.disabled = true;
  } else {
    box.innerHTML = `<div class="avail-ok">✅ Beschikbaar op ${date} van ${start} tot ${end}</div>`;
    btn.disabled = false;
  }
}

// ── Submit ─────────────────────────────────────────────────────────────────
async function submitRequest() {
  const naam    = document.getElementById('fNaam').value.trim();
  const email   = document.getElementById('fEmail').value.trim();
  const date    = document.getElementById('fDate').value;
  const start   = document.getElementById('fStart').value;
  const end     = document.getElementById('fEnd').value;
  const persons = +document.getElementById('fPersons').value;
  const reason  = document.getElementById('fReason').value.trim();

  if (!naam || !email || !selectedVehicle || !date || !start || !end || !reason) {
    notify('Vul alle velden in', 'error'); return;
  }
  if (start >= end) {
    notify('Aankomsttijd moet later zijn dan vertrektijd', 'error'); return;
  }

  // Double-check: only approved blocks
  const clash = requests.find(r =>
    r.vehicle_id === selectedVehicle &&
    r.date === date &&
    r.status === 'approved' &&
    timeOverlaps(start, end, r.start_time, r.end_time)
  );
  if (clash) {
    notify(`Voertuig al gereserveerd tussen ${clash.start_time} en ${clash.end_time}`, 'error'); return;
  }

  const vehicle = vehicles.find(v => v.id === selectedVehicle);

  // FIX: aanvrager zelf als eerste passagier opnemen
  const { error } = await sb.from('requests').insert({
    id: 'REQ-' + Date.now(),
    vehicle_id:   selectedVehicle,
    vehicle_name: vehicle?.name || selectedVehicle,
    naam, email, date,
    start_time: start,
    end_time:   end,
    persons, reason,
    passengers: naam,   // <-- aanvrager = eerste passagier
    status: 'pending',
  });

  if (error) { notify(error.message, 'error'); return; }
  notify('Reservatie aangevraagd!');
  document.getElementById('fReason').value = '';
  checkAvail();
}

// ── My requests ────────────────────────────────────────────────────────────
function renderMyRequests() {
  const email = document.getElementById('fEmail')?.value?.trim();
  const box   = document.getElementById('myRequests');
  if (!email) { box.innerHTML = '<p class="empty">Vul uw e-mail in.</p>'; return; }
  const mine = requests.filter(r => r.email === email);
  box.innerHTML = mine.length ? mine.map(r => reqCardHTML(r, false)).join('') : '<p class="empty">Nog geen aanvragen.</p>';
}

// ── Admin requests ─────────────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAdminRequests();
}

function updatePendingBadge() {
  const cnt = requests.filter(r => r.status === 'pending').length;
  const el  = document.getElementById('pendingBadge');
  if (el) el.textContent = cnt ? `(${cnt})` : '';
}

function renderAdminRequests() {
  const box = document.getElementById('adminRequests');
  if (!box) return;
  const list = currentFilter === 'all' ? requests : requests.filter(r => r.status === currentFilter);
  box.innerHTML = list.length ? list.map(r => reqCardHTML(r, true)).join('') : '<p class="empty">Geen aanvragen.</p>';
}

// ── Request card HTML ──────────────────────────────────────────────────────
function reqCardHTML(r, adminMode) {
  const vehicle = vehicles.find(v => v.id === r.vehicle_id);
  const seats   = vehicle?.seats || 0;

  // FIX: parse passagiers correct, filter lege waarden
  const paxList = (r.passengers || '')
    .split(',')
    .map(p => p.trim())
    .filter(Boolean);

  // Aanvrager staat al in paxList (eerste item); extra vrije plaatsen = seats - paxList.length
  const freeSeats = Math.max(0, seats - paxList.length);

  const statusLabel = r.status === 'pending' ? '⏳ Wachtend' : r.status === 'approved' ? '✅ Goedgekeurd' : '❌ Geweigerd';

  return `
    <div class="req-card ${r.status}">
      <div class="req-top">
        <div class="req-name">🚗 ${r.vehicle_name}</div>
        <div class="status ${r.status}">${statusLabel}</div>
      </div>
      <div class="req-meta">
        <div>👤 ${r.naam}</div>
        <div>📧 ${r.email}</div>
        <div>📅 ${r.date}</div>
        <div>🕒 ${r.start_time} → ${r.end_time}</div>
        <div>👥 ${paxList.length} / ${seats} plaatsen bezet</div>
        <div>📍 ${r.reason}</div>
      </div>
      <div class="pax-block">
        <div class="pax-title">👥 Inzittenden (${paxList.length}/${seats})</div>
        ${paxList.map((p, i) => `<div>${i === 0 ? '🟡' : '🟢'} ${p}${i === 0 ? ' <span style="color:var(--muted);font-size:12px">(aanvrager)</span>' : ''}</div>`).join('')}
        <div style="margin-top:6px">
          ${freeSeats > 0
            ? `<span class="pax-free">🟢 ${freeSeats} vrije ${freeSeats === 1 ? 'plaats' : 'plaatsen'}</span>`
            : `<span class="pax-full">🔴 Wagen volzet</span>`}
        </div>
      </div>
      ${adminMode && r.status === 'pending' ? `
        <div class="req-actions">
          <button class="btn-ok" onclick="decide('${r.id}','approved')">✅ Goedkeuren</button>
          <button class="btn-no" onclick="decide('${r.id}','rejected')">❌ Weigeren</button>
        </div>` : ''}
    </div>`;
}

async function decide(id, status) {
  const { error } = await sb.from('requests').update({ status, decided_at: new Date().toISOString() }).eq('id', id);
  if (error) { notify(error.message, 'error'); return; }
  notify(status === 'approved' ? '✅ Goedgekeurd' : '❌ Geweigerd');
}

// ── Public calendar / carpool ──────────────────────────────────────────────
function renderCalendar() {
  const approved = requests.filter(r => r.status === 'approved');
  const box = document.getElementById('publicCalendar');
  if (!approved.length) { box.innerHTML = '<p class="empty">Nog geen goedgekeurde reservaties.</p>'; return; }

  box.innerHTML = approved.map(r => {
    const vehicle   = vehicles.find(v => v.id === r.vehicle_id);
    const seats     = vehicle?.seats || 0;
    const paxList   = (r.passengers || '').split(',').map(p => p.trim()).filter(Boolean);
    const freeSeats = Math.max(0, seats - paxList.length);

    return `
      <div class="event">
        <div class="event-top">
          <div class="event-title">🚗 ${r.vehicle_name}</div>
          <div class="status approved">Goedgekeurd</div>
        </div>
        <div class="event-meta">
          <div>📅 ${r.date}</div>
          <div>🕒 ${r.start_time} → ${r.end_time}</div>
          <div>👤 ${r.naam}</div>
          <div>📍 ${r.reason}</div>
        </div>
        <div class="pax-block">
          <div class="pax-title">👥 Inzittenden (${paxList.length}/${seats})</div>
          ${paxList.map((p, i) => `<div>${i === 0 ? '🟡' : '🟢'} ${p}${i === 0 ? ' <span style="color:var(--muted);font-size:12px">(aanvrager)</span>' : ''}</div>`).join('')}
          <div style="margin-top:6px">
            ${freeSeats > 0
              ? `<span class="pax-free">🟢 ${freeSeats} vrije ${freeSeats === 1 ? 'plaats' : 'plaatsen'}</span>`
              : `<span class="pax-full">🔴 Wagen volzet</span>`}
          </div>
        </div>
        ${freeSeats > 0
          ? `<button class="btn-primary" style="margin-top:14px" onclick="openCarpoolModal('${r.id}','${r.vehicle_name}','${r.date}')">➕ Meerijden</button>`
          : `<div class="status rejected" style="margin-top:12px;padding:10px;text-align:center;border-radius:10px">🔴 Wagen volzet</div>`}
      </div>`;
  }).join('');
}

// ── Carpool modal ──────────────────────────────────────────────────────────
function openCarpoolModal(id, vehicleName, date) {
  carpoolTargetId = id;
  document.getElementById('carpoolSubtitle').textContent = `${vehicleName} · ${date}`;
  document.getElementById('carpoolName').value = '';
  document.getElementById('carpoolError').textContent = '';
  document.getElementById('carpoolModal').style.display = 'flex';
  setTimeout(() => document.getElementById('carpoolName').focus(), 80);
}

function closeCarpoolModal() {
  document.getElementById('carpoolModal').style.display = 'none';
  carpoolTargetId = null;
}

async function confirmCarpool() {
  const naam = document.getElementById('carpoolName').value.trim();
  if (!naam) { document.getElementById('carpoolError').textContent = '❌ Voer uw naam in.'; return; }

  const req     = requests.find(r => r.id === carpoolTargetId);
  if (!req) { notify('Reservatie niet gevonden', 'error'); closeCarpoolModal(); return; }

  const vehicle   = vehicles.find(v => v.id === req.vehicle_id);
  const seats     = vehicle?.seats || 0;
  const paxList   = (req.passengers || '').split(',').map(p => p.trim()).filter(Boolean);

  // Check: al in de lijst?
  if (paxList.some(p => p.toLowerCase() === naam.toLowerCase())) {
    document.getElementById('carpoolError').textContent = '❌ U staat al in deze wagen.'; return;
  }

  // Check: vol?
  if (paxList.length >= seats) {
    document.getElementById('carpoolError').textContent = '❌ Deze wagen is volzet.'; return;
  }

  paxList.push(naam);

  const { error } = await sb.from('requests').update({ passengers: paxList.join(', ') }).eq('id', carpoolTargetId);
  if (error) { notify(error.message, 'error'); closeCarpoolModal(); return; }

  closeCarpoolModal();
  notify(`${naam} toegevoegd aan carpool!`);
}

// ── Helpers ────────────────────────────────────────────────────────────────
// FIX: correcte tijdsvergelijking met minuten, niet alleen string vergelijking
function timeToMins(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function timeOverlaps(aStart, aEnd, bStart, bEnd) {
  return timeToMins(aStart) < timeToMins(bEnd) &&
         timeToMins(bStart) < timeToMins(aEnd);
}

function setToday() {
  const now  = new Date();
  const date = now.getFullYear() + '-' +
    String(now.getMonth() + 1).padStart(2, '0') + '-' +
    String(now.getDate()).padStart(2, '0');
  const el = document.getElementById('fDate');
  el.value = date;
  el.min   = date;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAdminRequests();
}

let nTimer;
function notify(msg, type = 'success') {
  const el = document.getElementById('notification');
  el.className = `notif ${type}`;
  el.textContent = msg;
  el.style.display = 'block';
  clearTimeout(nTimer);
  nTimer = setTimeout(() => el.style.display = 'none', 4000);
}
</script>
