<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Voertuigreservatie · Brandweer</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
  --red:#d42b2b;
  --red2:#b01e1e;
  --dark:#161a1d;
  --panel:#1e2329;
  --border:#2f3740;
  --text:#e8ecef;
  --muted:#7a8694;
  --green:#22c55e;
  --orange:#f97316;
  --blue:#3b82f6;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  background:var(--dark);
  color:var(--text);
  font-family:'Barlow',sans-serif;
  min-height:100vh;
}

/* ───────────────── TOPBAR ───────────────── */

.topbar{
  background:var(--red);
  padding:0 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  min-height:58px;
  gap:10px;
}

.topbar-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  font-size:28px;
}

.site-title{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;
  font-size:22px;
}

.site-sub{
  font-size:11px;
  opacity:.8;
  text-transform:uppercase;
  letter-spacing:1px;
}

.nav{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.nav-btn{
  border:none;
  background:transparent;
  color:rgba(255,255,255,.8);
  cursor:pointer;
  padding:14px 16px;
  font-family:'Barlow',sans-serif;
  font-weight:600;
  transition:.2s;
  border-radius:8px;
}

.nav-btn:hover{
  background:rgba(255,255,255,.1);
  color:white;
}

.nav-btn.active{
  background:rgba(255,255,255,.18);
  color:white;
}

/* ───────────────── MAIN ───────────────── */

.main{
  max-width:1200px;
  margin:auto;
  padding:24px 18px;
}

.two-col{
  display:grid;
  grid-template-columns:1.1fr 1fr;
  gap:20px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:22px;
}

.card-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;
  margin-bottom:18px;
}

/* ───────────────── FORM ───────────────── */

label.lbl{
  display:block;
  margin-top:14px;
  margin-bottom:5px;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.8px;
  color:var(--muted);
  font-weight:700;
}

input,
select,
textarea,
button{
  min-height:44px;
}

input,
select,
textarea{
  width:100%;
  border-radius:10px;
  border:1.5px solid var(--border);
  background:#12161a;
  color:var(--text);
  padding:10px 12px;
  font-family:'Barlow',sans-serif;
  outline:none;
}

input:focus,
select:focus{
  border-color:var(--red);
}

.row{
  display:flex;
  gap:12px;
}

.row > *{
  flex:1;
}

/* ───────────────── VEHICLES ───────────────── */

.vehicle-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:8px;
}

.v-btn{
  background:#12161a;
  border:2px solid var(--border);
  border-radius:12px;
  padding:14px;
  cursor:pointer;
  transition:.2s;
  color:var(--text);
}

.v-btn:hover{
  border-color:#666;
}

.v-btn.selected{
  border-color:var(--red);
  background:rgba(212,43,43,.1);
}

.v-icon{
  font-size:26px;
  margin-bottom:6px;
}

.v-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:16px;
  font-weight:700;
}

.v-meta{
  color:var(--muted);
  font-size:12px;
}

/* ───────────────── DURATION ───────────────── */

.dur-grid{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:8px;
}

.dur-btn{
  border-radius:20px;
  border:1.5px solid var(--border);
  background:#12161a;
  color:var(--muted);
  padding:8px 14px;
  cursor:pointer;
}

.dur-btn.selected{
  background:var(--red);
  border-color:var(--red);
  color:white;
}

/* ───────────────── BUTTONS ───────────────── */

.btn-primary{
  width:100%;
  margin-top:18px;
  border:none;
  border-radius:10px;
  background:var(--red);
  color:white;
  cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;
  font-size:18px;
  font-weight:700;
}

.btn-primary:hover{
  background:var(--red2);
}

.btn-primary:disabled{
  opacity:.5;
  cursor:not-allowed;
}

/* ───────────────── AVAILABILITY ───────────────── */

.avail{
  margin-top:16px;
  padding:12px;
  border-radius:10px;
  border:1.5px solid;
  display:flex;
  gap:10px;
  align-items:center;
}

.avail.ok{
  border-color:#22c55e;
  background:rgba(34,197,94,.08);
  color:#86efac;
}

.avail.nok{
  border-color:#ef4444;
  background:rgba(239,68,68,.08);
  color:#fca5a5;
}

/* ───────────────── REQUESTS ───────────────── */

.req-card{
  background:#12161a;
  border-radius:10px;
  padding:14px;
  margin-bottom:12px;
  border-left:4px solid var(--border);
}

.req-card.pending{
  border-left-color:var(--orange);
}

.req-card.approved{
  border-left-color:var(--green);
}

.req-card.rejected{
  border-left-color:#ef4444;
}

.req-top{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-bottom:10px;
}

.req-meta{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px 14px;
  font-size:13px;
  color:var(--muted);
}

.req-actions{
  display:flex;
  gap:8px;
  margin-top:14px;
}

.btn-approve,
.btn-reject{
  flex:1;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

.btn-approve{
  background:rgba(34,197,94,.12);
  border:1px solid #22c55e;
  color:#22c55e;
}

.btn-reject{
  background:rgba(239,68,68,.12);
  border:1px solid #ef4444;
  color:#ef4444;
}

/* ───────────────── PILLS ───────────────── */

.pill{
  border-radius:20px;
  padding:4px 10px;
  font-size:11px;
  font-weight:700;
}

.pill.pending{
  background:rgba(249,115,22,.15);
  color:var(--orange);
}

.pill.approved{
  background:rgba(34,197,94,.15);
  color:var(--green);
}

.pill.rejected{
  background:rgba(239,68,68,.15);
  color:#ef4444;
}

/* ───────────────── FILTERS ───────────────── */

.filters,
.admin-tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.filter-btn,
.admin-tab{
  border-radius:8px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--muted);
  cursor:pointer;
  padding:8px 14px;
}

.filter-btn.active,
.admin-tab.active{
  background:var(--red);
  border-color:var(--red);
  color:white;
}

/* ───────────────── TABLE ───────────────── */

table{
  width:100%;
  border-collapse:collapse;
  min-width:650px;
}

th,
td{
  padding:10px;
  border-bottom:1px solid #252c33;
  text-align:left;
}

th{
  color:var(--muted);
  font-size:12px;
  text-transform:uppercase;
}

#tab-vehicles{
  overflow-x:auto;
}

/* ───────────────── CALENDAR ───────────────── */

.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:4px;
}

.cal-head{
  text-align:center;
  font-size:11px;
  color:var(--muted);
  font-weight:700;
  padding:4px;
}

.cal-day{
  min-height:60px;
  border:1px solid var(--border);
  border-radius:8px;
  padding:5px;
  text-align:center;
}

.cal-day.has-events{
  background:rgba(59,130,246,.06);
  cursor:pointer;
}

.cal-day.today{
  border-color:var(--red);
}

.day-num{
  font-size:14px;
}

.cal-dot{
  background:var(--red);
  color:white;
  border-radius:20px;
  display:inline-block;
  margin-top:5px;
  padding:2px 6px;
  font-size:10px;
}

/* ───────────────── NOTIFICATION ───────────────── */

.notif{
  position:fixed;
  top:14px;
  right:14px;
  padding:12px 18px;
  border-radius:10px;
  z-index:999;
}

.notif.success{
  background:#14532d;
}

.notif.error{
  background:#7f1d1d;
}

/* ───────────────── LOADING ───────────────── */

.loading{
  height:70vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:14px;
}

.spinner{
  width:36px;
  height:36px;
  border:4px solid var(--border);
  border-top-color:var(--red);
  border-radius:50%;
  animation:spin .8s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

.empty{
  text-align:center;
  color:var(--muted);
  padding:30px;
}

/* ───────────────── TABLET ───────────────── */

@media(max-width:1024px){

  .two-col{
    grid-template-columns:1fr;
  }

  .vehicle-grid{
    grid-template-columns:repeat(2,1fr);
  }

  .req-meta{
    grid-template-columns:1fr;
  }
}

/* ───────────────── MOBILE ───────────────── */

@media(max-width:700px){

  .topbar{
    flex-direction:column;
    padding:12px;
  }

  .topbar-left{
    justify-content:center;
  }

  .nav{
    width:100%;
    justify-content:center;
  }

  .nav-btn{
    flex:1;
  }

  .vehicle-grid{
    grid-template-columns:1fr;
  }

  .row{
    flex-direction:column;
  }

  .req-top{
    flex-direction:column;
  }

  .req-actions{
    flex-direction:column;
  }

  .admin-tabs{
    flex-direction:column;
  }

  .admin-tab{
    width:100%;
  }

  .filters{
    flex-direction:column;
  }

  .filter-btn{
    width:100%;
  }

  .cal-day{
    min-height:48px;
  }

  .notif{
    left:10px;
    right:10px;
    top:10px;
  }
}

</style>
</head>

<body>

<header class="topbar">

  <div class="topbar-left">
    <span class="logo">🚒</span>

    <div>
      <div class="site-title">Voertuigreservatie</div>
      <div class="site-sub">
        Live systeem
      </div>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" id="btnUser" onclick="showView('user')">
      👤 Aanvraag
    </button>

    <button class="nav-btn" id="btnAdmin" onclick="showView('admin')">
      🔐 Beheer
    </button>

    <button class="nav-btn" id="btnLogout" onclick="logoutAdmin()" style="display:none">
      🚪 Uitloggen
    </button>
  </nav>

</header>

<div id="notification" style="display:none" class="notif"></div>

<div class="main">

  <div id="loadingView" class="loading">
    <div class="spinner"></div>
    <span>Verbinding maken met database…</span>
  </div>

  <!-- USER VIEW -->

  <div id="userView" style="display:none">

    <div class="two-col">

      <!-- FORM -->

      <div class="card">

        <div class="card-title">
          📋 Nieuwe reservatie
        </div>

        <label class="lbl">Uw naam</label>
        <input id="fNaam" type="text"/>

        <label class="lbl">E-mailadres</label>
        <input id="fEmail" type="email" oninput="loadMyRequests()"/>

        <label class="lbl">Voertuig</label>
        <div class="vehicle-grid" id="vehicleGrid"></div>

        <div class="row">

          <div>
            <label class="lbl">Datum</label>
            <input id="fDate" type="date" onchange="checkAvailability()"/>
          </div>

          <div>
            <label class="lbl">Vertrekuur</label>
            <input id="fTime" type="time" value="08:00" onchange="checkAvailability()"/>
          </div>

        </div>

        <label class="lbl">Tijdsduur</label>
        <div class="dur-grid" id="durGrid"></div>

        <div class="row" style="margin-top:14px">

          <div>
            <label class="lbl">Aantal personen</label>
            <input id="fPersons" type="number" min="1" value="1"/>
          </div>

          <div style="flex:2">
            <label class="lbl">Reden</label>
            <input id="fReden" type="text"/>
          </div>

        </div>

        <div id="availBox" style="display:none"></div>

        <button class="btn-primary" id="submitBtn" onclick="submitRequest()">
          📨 Aanvraag indienen
        </button>

      </div>

      <!-- MY REQUESTS -->

      <div class="card">

        <div class="card-title">
          📁 Mijn aanvragen
        </div>

        <div id="myRequests">
          <p class="empty">
            Vul uw e-mailadres in.
          </p>
        </div>

      </div>

    </div>

  </div>

  <!-- ADMIN VIEW -->

  <div id="adminView" style="display:none">

    <div class="admin-tabs">

      <button class="admin-tab active" onclick="showAdminTab('requests')">
        📋 Aanvragen
      </button>

      <button class="admin-tab" onclick="showAdminTab('vehicles')">
        🚗 Voertuigen
      </button>

      <button class="admin-tab" onclick="showAdminTab('calendar')">
        📅 Agenda
      </button>

    </div>

    <!-- REQUESTS -->

    <div id="tab-requests" class="card">

      <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:18px">

        <div class="card-title" style="margin-bottom:0">
          Reservaties
        </div>

        <div class="filters">

          <button class="filter-btn active" onclick="setFilter('pending',this)">
            Wachtend
          </button>

          <button class="filter-btn" onclick="setFilter('approved',this)">
            Goedgekeurd
          </button>

          <button class="filter-btn" onclick="setFilter('rejected',this)">
            Geweigerd
          </button>

          <button class="filter-btn" onclick="setFilter('all',this)">
            Alles
          </button>

        </div>

      </div>

      <div id="requestsList"></div>

    </div>

    <!-- VEHICLES -->

    <div id="tab-vehicles" class="card" style="display:none">

      <div class="card-title">
        🚗 Voertuigen beheren
      </div>

      <div class="row" style="margin-bottom:14px;flex-wrap:wrap">

        <input id="vId" placeholder="ID"/>
        <input id="vName" placeholder="Naam"/>
        <input id="vSeats" type="number" placeholder="Zetels" value="5"/>

        <select id="vType">
          <option>MPV</option>
          <option>Bus</option>
          <option>Bestelwagen</option>
        </select>

        <button class="btn-primary" style="margin-top:0" onclick="addVehicle()">
          Toevoegen
        </button>

      </div>

      <table>

        <thead>
          <tr>
            <th>ID</th>
            <th>Naam</th>
            <th>Zetels</th>
            <th>Type</th>
          </tr>
        </thead>

        <tbody id="vehicleTable"></tbody>

      </table>

    </div>

    <!-- CALENDAR -->

    <div id="tab-calendar" class="card" style="display:none">

      <div class="card-title">
        📅 Agenda
      </div>

      <div class="cal-grid" id="calGrid"></div>

    </div>

  </div>

</div>

<script>

/* ───────────────── SUPABASE ───────────────── */

const SUPABASE_URL = 'https://xcdrsenbvrxyjywkzgci.supabase.co';
const SUPABASE_KEY = 'sb_publishable_UCPiJ3V8A_x9rcWKisHTaA_zdHp9Nsv';

const sb = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

/* ───────────────── ADMIN ───────────────── */

const ADMIN_CODE = "2200";

let isAdmin = false;

/* ───────────────── STATE ───────────────── */

let vehicles = [];
let requests = [];

let selectedVehicle = null;
let selectedDuration = 60;

let currentFilter = 'pending';

const DURATIONS = [
  {label:'30 min', value:30},
  {label:'1 uur', value:60},
  {label:'2 uur', value:120},
  {label:'4 uur', value:240},
  {label:'Hele dag', value:480}
];

/* ───────────────── INIT ───────────────── */

(async function(){

  await loadData();

  renderDurations();

  setTodayDate();

  document.getElementById('loadingView').style.display='none';
  document.getElementById('userView').style.display='block';

})();

/* ───────────────── LOAD DATA ───────────────── */

async function loadData(){

  const [vRes, rRes] = await Promise.all([
    sb.from('vehicles').select('*').order('id'),
    sb.from('requests').select('*').order('created_at',{ascending:false})
  ]);

  vehicles = vRes.data || [];
  requests = rRes.data || [];

  renderVehicleGrid();
  renderRequests();
  renderVehicleTable();
  renderCalendar();

}

/* ───────────────── VIEW SWITCH ───────────────── */

function showView(v){

  if(v === 'admin' && !isAdmin){

    const code = prompt("Admin code");

    if(code !== ADMIN_CODE){
      notify("Foute admin code","error");
      return;
    }

    isAdmin = true;

    document.getElementById('btnLogout').style.display='block';

    notify("Admin toegang verleend");
  }

  document.getElementById('userView').style.display =
    v==='user' ? 'block':'none';

  document.getElementById('adminView').style.display =
    v==='admin' ? 'block':'none';

  document.getElementById('btnUser').classList.toggle('active', v==='user');
  document.getElementById('btnAdmin').classList.toggle('active', v==='admin');

}

function logoutAdmin(){

  isAdmin = false;

  document.getElementById('btnLogout').style.display='none';

  showView('user');

  notify("Admin afgemeld");

}

/* ───────────────── ADMIN TABS ───────────────── */

function showAdminTab(tab){

  ['requests','vehicles','calendar'].forEach(t=>{
    document.getElementById('tab-'+t).style.display =
      t===tab ? 'block':'none';
  });

  document.querySelectorAll('.admin-tab').forEach((b,i)=>{
    b.classList.toggle(
      'active',
      ['requests','vehicles','calendar'][i]===tab
    );
  });

}

/* ───────────────── VEHICLES ───────────────── */

function renderVehicleGrid(){

  const grid = document.getElementById('vehicleGrid');

  grid.innerHTML = vehicles.map(v=>{

    const icon =
      v.type === 'Bus' ? '🚌' :
      v.type === 'Bestelwagen' ? '🚐' :
      '🚗';

    return `
      <button class="v-btn ${selectedVehicle===v.id?'selected':''}"
      onclick="selectVehicle('${v.id}')">

        <div class="v-icon">${icon}</div>

        <div class="v-name">${v.name}</div>

        <div class="v-meta">
          ${v.seats} pers · ${v.type}
        </div>

      </button>
    `;

  }).join('');

}

function selectVehicle(id){

  selectedVehicle = id;

  renderVehicleGrid();

  checkAvailability();

}

/* ───────────────── DURATIONS ───────────────── */

function renderDurations(){

  document.getElementById('durGrid').innerHTML =
    DURATIONS.map(d=>`
      <button class="dur-btn ${d.value===selectedDuration?'selected':''}"
      onclick="selectDuration(${d.value})">
        ${d.label}
      </button>
    `).join('');

}

function selectDuration(v){

  selectedDuration = v;

  renderDurations();

  checkAvailability();

}

/* ───────────────── DATE ───────────────── */

function setTodayDate(){

  const t = new Date();

  document.getElementById('fDate').value = fmtDate(t);
  document.getElementById('fDate').min = fmtDate(t);

}

/* ───────────────── CHECK AVAILABILITY ───────────────── */

function checkAvailability(){

  const box = document.getElementById('availBox');

  if(!selectedVehicle){
    box.style.display='none';
    return;
  }

  const date = document.getElementById('fDate').value;
  const time = document.getElementById('fTime').value;

  const approved = requests.filter(r=>
    r.vehicle_id===selectedVehicle &&
    r.status==='approved'
  );

  const clash = approved.find(r=>
    overlaps(
      {date,time,duration:selectedDuration},
      {date:r.date,time:r.time,duration:r.duration}
    )
  );

  box.style.display='flex';

  if(clash){

    box.className='avail nok';

    box.innerHTML=`
      ❌ Reeds gereserveerd
    `;

    document.getElementById('submitBtn').disabled=true;

  }else{

    box.className='avail ok';

    box.innerHTML=`
      ✅ Beschikbaar
    `;

    document.getElementById('submitBtn').disabled=false;

  }

}

/* ───────────────── SUBMIT ───────────────── */

async function submitRequest(){

  const naam = document.getElementById('fNaam').value.trim();
  const email = document.getElementById('fEmail').value.trim();
  const date = document.getElementById('fDate').value;
  const time = document.getElementById('fTime').value;
  const persons = +document.getElementById('fPersons').value;
  const reden = document.getElementById('fReden').value.trim();

  if(!naam || !email || !selectedVehicle || !reden){

    notify("Vul alle velden in","error");
    return;

  }

  const vehicle = vehicles.find(v=>v.id===selectedVehicle);

  const {error} = await sb.from('requests').insert({

    id:'REQ-'+Date.now(),

    vehicle_id:selectedVehicle,
    vehicle_name:vehicle.name,

    naam,
    email,
    date,
    time,

    duration:selectedDuration,

    persons,
    reden,

    status:'pending'

  });

  if(error){

    notify(error.message,"error");
    return;

  }

  notify("Aanvraag ingediend");

  document.getElementById('fReden').value='';

  await loadData();

  loadMyRequests();

}

/* ───────────────── MY REQUESTS ───────────────── */

function loadMyRequests(){

  const email =
    document.getElementById('fEmail').value.trim();

  const container =
    document.getElementById('myRequests');

  if(!email){

    container.innerHTML =
      `<p class="empty">Vul uw e-mailadres in.</p>`;

    return;
  }

  const mine =
    requests.filter(r=>r.email===email);

  if(!mine.length){

    container.innerHTML =
      `<p class="empty">Geen aanvragen gevonden.</p>`;

    return;
  }

  container.innerHTML =
    mine.map(r=>reqCardHTML(r,false)).join('');

}

/* ───────────────── REQUESTS ───────────────── */

function setFilter(f,btn){

  currentFilter=f;

  document.querySelectorAll('.filter-btn')
    .forEach(b=>b.classList.remove('active'));

  btn.classList.add('active');

  renderRequests();

}

function renderRequests(){

  const filtered =
    currentFilter==='all'
      ? requests
      : requests.filter(r=>r.status===currentFilter);

  document.getElementById('requestsList').innerHTML =
    filtered.length
      ? filtered.map(r=>reqCardHTML(r,true)).join('')
      : `<p class="empty">Geen aanvragen.</p>`;

}

function reqCardHTML(r,isAdmin){

  const dur =
    DURATIONS.find(d=>d.value===r.duration);

  return `
    <div class="req-card ${r.status}">

      <div class="req-top">

        <strong>
          ${r.vehicle_name}
        </strong>

        <span class="pill ${r.status}">
          ${r.status}
        </span>

      </div>

      <div class="req-meta">

        <span>👤 ${r.naam}</span>
        <span>📧 ${r.email}</span>

        <span>📅 ${r.date}</span>
        <span>🕐 ${r.time}</span>

        <span>👥 ${r.persons}</span>
        <span>📍 ${r.reden}</span>

      </div>

      ${
        isAdmin && r.status==='pending'
        ? `
        <div class="req-actions">

          <button class="btn-approve"
          onclick="decide('${r.id}','approved')">
            Goedkeuren
          </button>

          <button class="btn-reject"
          onclick="decide('${r.id}','rejected')">
            Weigeren
          </button>

        </div>
        `
        : ''
      }

    </div>
  `;

}

async function decide(id,status){

  const {error} = await sb
    .from('requests')
    .update({status})
    .eq('id',id);

  if(error){

    notify(error.message,"error");
    return;

  }

  notify("Reservatie aangepast");

  await loadData();

}

/* ───────────────── VEHICLE TABLE ───────────────── */

function renderVehicleTable(){

  document.getElementById('vehicleTable').innerHTML =
    vehicles.map(v=>`

      <tr>
        <td>${v.id}</td>
        <td>${v.name}</td>
        <td>${v.seats}</td>
        <td>${v.type}</td>
      </tr>

    `).join('');

}

async function addVehicle(){

  const id =
    document.getElementById('vId').value.trim();

  const name =
    document.getElementById('vName').value.trim();

  const seats =
    +document.getElementById('vSeats').value;

  const type =
    document.getElementById('vType').value;

  if(!id || !name){

    notify("Vul alles in","error");
    return;

  }

  const {error} = await sb.from('vehicles').insert({
    id,name,seats,type
  });

  if(error){

    notify(error.message,"error");
    return;

  }

  notify("Voertuig toegevoegd");

  await loadData();

}

/* ───────────────── CALENDAR ───────────────── */

function renderCalendar(){

  const approved =
    requests.filter(r=>r.status==='approved');

  const days = {};

  approved.forEach(r=>{

    if(!days[r.date]){
      days[r.date]=0;
    }

    days[r.date]++;

  });

  let html = '';

  Object.keys(days).sort().forEach(date=>{

    html += `
      <div class="cal-day has-events">

        <div class="day-num">
          ${date}
        </div>

        <div class="cal-dot">
          ${days[date]} reservaties
        </div>

      </div>
    `;

  });

  if(!html){
    html = `<p class="empty">Geen reservaties.</p>`;
  }

  document.getElementById('calGrid').innerHTML=html;

}

/* ───────────────── HELPERS ───────────────── */

function overlaps(a,b){

  const toMins=(date,time)=>{

    const [h,m]=time.split(':').map(Number);

    const [yr,mo,dy]=date.split('-').map(Number);

    return new Date(yr,mo-1,dy).getTime()/60000
      + h*60 + m;

  };

  const aS=toMins(a.date,a.time);
  const aE=aS+a.duration;

  const bS=toMins(b.date,b.time);
  const bE=bS+b.duration;

  return aS<bE && bS<aE;

}

function pad(n){
  return String(n).padStart(2,'0');
}

function fmtDate(d){

  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

}

/* ───────────────── NOTIFY ───────────────── */

let notifTimer;

function notify(msg,type='success'){

  const el =
    document.getElementById('notification');

  el.textContent = msg;

  el.className = `notif ${type}`;

  el.style.display='block';

  clearTimeout(notifTimer);

  notifTimer = setTimeout(()=>{
    el.style.display='none';
  },4000);

}

</script>
