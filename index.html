<!DOCTYPE html>
<html lang="nl">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>Brandweer Voertuigreservatie</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
  --red:#d42b2b;
  --red2:#b61f1f;
  --dark:#171b20;
  --panel:#20262d;
  --border:#313942;
  --text:#edf1f4;
  --muted:#8a97a5;
  --green:#22c55e;
  --orange:#f97316;
  --blue:#3b82f6;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--dark);
  color:var(--text);
  font-family:'Barlow',sans-serif;
  min-height:100vh;
}

/* TOPBAR */

.topbar{
  background:var(--red);
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

.top-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  font-size:30px;
}

.site-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:28px;
  font-weight:800;
}

.site-sub{
  font-size:12px;
  opacity:.8;
  text-transform:uppercase;
}

.nav{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.nav button{
  border:none;
  background:rgba(255,255,255,.12);
  color:white;
  padding:10px 16px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

.nav button.active{
  background:white;
  color:var(--red);
}

/* MAIN */

.main{
  max-width:1400px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:22px;
}

.card-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:24px;
  margin-bottom:18px;
}

/* FORM */

label{
  display:block;
  margin-top:14px;
  margin-bottom:6px;
  font-size:12px;
  color:var(--muted);
  text-transform:uppercase;
  font-weight:700;
}

input,
select,
button{
  min-height:46px;
  font-family:'Barlow',sans-serif;
}

input,
select{
  width:100%;
  background:#14181d;
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:10px 12px;
  color:var(--text);
  outline:none;
}

input:focus,
select:focus{
  border-color:var(--red);
}

.row{
  display:flex;
  gap:12px;
}

.row > *{
  flex:1;
}

/* VEHICLES */

.vehicle-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  margin-top:8px;
}

.v-btn{
  background:#14181d;
  border:2px solid var(--border);
  border-radius:12px;
  padding:14px;
  cursor:pointer;
  transition:.2s;
  text-align:left;
  color:var(--text);
}

.v-btn.selected{
  border-color:var(--red);
  background:rgba(212,43,43,.12);
}

.v-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:18px;
  font-weight:700;
}

.v-meta{
  font-size:13px;
  color:var(--muted);
  margin-top:4px;
}

/* BUTTONS */

.btn-primary{
  width:100%;
  border:none;
  border-radius:10px;
  background:var(--red);
  color:white;
  font-weight:700;
  cursor:pointer;
  margin-top:20px;
  font-size:16px;
}

.btn-primary:hover{
  background:var(--red2);
}

.btn-small{
  border:none;
  border-radius:10px;
  padding:10px 14px;
  cursor:pointer;
  font-weight:700;
}

.btn-edit{
  background:rgba(59,130,246,.15);
  color:#93c5fd;
}

.btn-delete{
  background:rgba(239,68,68,.15);
  color:#fca5a5;
}

.btn-ok{
  background:rgba(34,197,94,.15);
  color:var(--green);
}

.btn-no{
  background:rgba(239,68,68,.15);
  color:#ef4444;
}

/* STATUS */

.status{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:700;
}

.pending{
  background:rgba(249,115,22,.15);
  color:var(--orange);
}

.approved{
  background:rgba(34,197,94,.15);
  color:var(--green);
}

.rejected{
  background:rgba(239,68,68,.15);
  color:#ef4444;
}

/* REQUESTS */

.req-card{
  background:#14181d;
  border-radius:12px;
  padding:16px;
  margin-bottom:14px;
  border-left:4px solid var(--border);
}

.req-card.pending{
  border-left-color:var(--orange);
}

.req-card.approved{
  border-left-color:var(--green);
}

.req-card.rejected{
  border-left-color:#ef4444;
}

.req-top{
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

.req-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;
  font-weight:700;
}

.req-meta{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 16px;
  color:var(--muted);
  font-size:14px;
}

.req-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:16px;
}

.free-spots{
  margin-top:10px;
  background:rgba(59,130,246,.12);
  color:#93c5fd;
  border-radius:10px;
  padding:10px;
  font-size:14px;
  font-weight:600;
}

/* TABS */

.tabs{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.tabs button{
  border:none;
  border-radius:10px;
  padding:10px 16px;
  cursor:pointer;
  background:#14181d;
  color:var(--muted);
  font-weight:700;
}

.tabs button.active{
  background:var(--red);
  color:white;
}

/* TABLE */

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid var(--border);
  text-align:left;
}

th{
  color:var(--muted);
  font-size:13px;
}

/* POPUP */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  padding:20px;
}

.modal-content{
  width:100%;
  max-width:420px;
  background:linear-gradient(180deg,#252d36,#1d2329);
  border:1px solid var(--border);
  border-radius:20px;
  padding:28px;
  box-shadow:0 20px 50px rgba(0,0,0,.4);
}

.modal-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:32px;
  margin-bottom:10px;
}

.modal-sub{
  color:var(--muted);
  margin-bottom:20px;
  line-height:1.5;
}

.modal-buttons{
  display:flex;
  gap:10px;
  margin-top:18px;
}

.modal-buttons button{
  flex:1;
}

/* NOTIFICATION */

.notif{
  position:fixed;
  top:14px;
  right:14px;
  z-index:999;
  padding:14px 18px;
  border-radius:12px;
  font-weight:700;
}

.notif.success{
  background:#14532d;
  color:#dcfce7;
}

.notif.error{
  background:#7f1d1d;
  color:#fecaca;
}

/* RESPONSIVE */

@media(max-width:1000px){

  .grid{
    grid-template-columns:1fr;
  }

}

@media(max-width:700px){

  .row{
    flex-direction:column;
  }

  .vehicle-grid{
    grid-template-columns:1fr;
  }

  .req-meta{
    grid-template-columns:1fr;
  }

  .topbar{
    flex-direction:column;
    align-items:flex-start;
  }

}

</style>
</head>

<body>

<header class="topbar">

  <div class="top-left">

    <div class="logo">🚒</div>

    <div>
      <div class="site-title">Voertuigreservatie</div>
      <div class="site-sub">Brandweer</div>
    </div>

  </div>

  <div class="nav">

    <button class="active" id="btnUser" onclick="showView('user')">
      👤 Reservatie
    </button>

    <button id="btnAdmin" onclick="openAdminModal()">
      🔐 Beheer
    </button>

    <button id="btnLogout" onclick="logoutAdmin()" style="display:none">
      🚪 Uitloggen
    </button>

  </div>

</header>

<div id="notification" style="display:none"></div>

<!-- ADMIN MODAL -->

<div class="modal" id="adminModal">

  <div class="modal-content">

    <div class="modal-title">
      🔐 Admin toegang
    </div>

    <div class="modal-sub">
      Geef de beheerderscode in om reservaties en voertuigen te beheren.
    </div>

    <input id="adminCodeInput" type="password" placeholder="Admin code">

    <div class="modal-buttons">

      <button class="btn-primary" onclick="checkAdminCode()">
        Inloggen
      </button>

      <button class="btn-small btn-delete" onclick="closeAdminModal()">
        Annuleren
      </button>

    </div>

  </div>

</div>

<div class="main">

  <div id="userView">

    <div class="grid">

      <div class="card">

        <div class="card-title">
          📋 Nieuwe reservatie
        </div>

        <label>Naam</label>
        <input id="fNaam" type="text">

        <label>E-mailadres</label>
        <input id="fEmail" type="email" oninput="renderMyRequests()">

        <label>Voertuig</label>
        <div class="vehicle-grid" id="vehicleGrid"></div>

        <div class="row">

          <div>
            <label>Datum</label>
            <input id="fDate" type="date">
          </div>

          <div>
            <label>Vertrek</label>
            <input id="fStart" type="time" value="08:00">
          </div>

          <div>
            <label>Aankomst</label>
            <input id="fEnd" type="time" value="12:00">
          </div>

        </div>

        <div class="row">

          <div>
            <label>Aantal personen</label>
            <input id="fPersons" type="number" value="1">
          </div>

          <div style="flex:2">
            <label>Bestemming / locatie</label>
            <input id="fReason" type="text">
          </div>

        </div>

        <button class="btn-primary" onclick="submitRequest()">
          📨 Reservatie aanvragen
        </button>

      </div>

      <div class="card">

        <div class="card-title">
          📁 Mijn aanvragen
        </div>

        <div id="myRequests"></div>

      </div>

    </div>

    <div class="card" style="margin-top:20px">

      <div class="card-title">
        📅 Publieke agenda & carpooling
      </div>

      <div id="publicCalendar"></div>

    </div>

  </div>

  <!-- ADMIN -->

  <div id="adminView" style="display:none">

    <div class="tabs">

      <button class="active" onclick="showTab('requests',this)">
        📋 Reservaties
      </button>

      <button onclick="showTab('vehicles',this)">
        🚗 Voertuigen
      </button>

    </div>

    <!-- REQUESTS -->

    <div id="tab-requests">
      <div id="adminRequests"></div>
    </div>

    <!-- VEHICLES -->

    <div id="tab-vehicles" style="display:none">

      <div class="card">

        <div class="card-title">
          🚗 Voertuigen beheren
        </div>

        <div class="row">

          <input id="vId" placeholder="ID">
          <input id="vName" placeholder="Naam">
          <input id="vSeats" type="number" value="5">
          
          <select id="vType">
            <option>MPV</option>
            <option>Bus</option>
            <option>Bestelwagen</option>
            <option>SUV</option>
          </select>

        </div>

        <button class="btn-primary" onclick="saveVehicle()">
          💾 Opslaan
        </button>

      </div>

      <div class="card" style="margin-top:20px">

        <table>

          <thead>
            <tr>
              <th>ID</th>
              <th>Naam</th>
              <th>Zetels</th>
              <th>Type</th>
              <th>Acties</th>
            </tr>
          </thead>

          <tbody id="vehicleTable"></tbody>

        </table>

      </div>

    </div>

  </div>

</div>

<script>

const SUPABASE_URL = 'https://xcdrsenbvrxyjywkzgci.supabase.co';
const SUPABASE_KEY = 'sb_publishable_UCPiJ3V8A_x9rcWKisHTaA_zdHp9Nsv';

const sb = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const ADMIN_CODE = "2200";

let isAdmin = false;
let vehicles = [];
let requests = [];
let selectedVehicle = null;
let editingVehicle = null;

/* INIT */

(async function(){

  await loadData();

  setupRealtime();

  setToday();

})();

/* LOAD */

async function loadData(){

  const [vRes,rRes] = await Promise.all([

    sb.from('vehicles')
      .select('*')
      .order('id'),

    sb.from('requests')
      .select('*')
      .order('created_at',{ascending:false})

  ]);

  vehicles = vRes.data || [];
  requests = rRes.data || [];

  renderVehicles();
  renderVehicleTable();
  renderMyRequests();
  renderAdminRequests();
  renderCalendar();

}

/* REALTIME */

function setupRealtime(){

  sb.channel('live-updates')

  .on(
    'postgres_changes',
    {event:'*',schema:'public',table:'requests'},
    payload => {

      loadData();

      const r = payload.new;

      if(!r) return;

      const myMail =
        document.getElementById('fEmail').value.trim();

      if(
        myMail &&
        r.email === myMail &&
        r.status !== 'pending'
      ){

        notify(
          r.status === 'approved'
            ? '✅ Uw reservatie werd goedgekeurd'
            : '❌ Uw reservatie werd geweigerd',
          r.status === 'approved'
            ? 'success'
            : 'error'
        );

      }

    }

  ).subscribe();

}

/* ADMIN POPUP */

function openAdminModal(){
  document.getElementById('adminModal').style.display='flex';
}

function closeAdminModal(){
  document.getElementById('adminModal').style.display='none';
}

function checkAdminCode(){

  const code =
    document.getElementById('adminCodeInput').value;

  if(code !== ADMIN_CODE){

    notify("Foute admin code","error");
    return;

  }

  isAdmin = true;

  closeAdminModal();

  document.getElementById('btnLogout').style.display='block';

  showView('admin');

}

/* VIEW */

function showView(v){

  document.getElementById('userView').style.display =
    v==='user' ? 'block':'none';

  document.getElementById('adminView').style.display =
    v==='admin' ? 'block':'none';

  document.getElementById('btnUser')
    .classList.toggle('active',v==='user');

  document.getElementById('btnAdmin')
    .classList.toggle('active',v==='admin');

}

function logoutAdmin(){

  isAdmin = false;

  document.getElementById('btnLogout').style.display='none';

  showView('user');

}

/* TABS */

function showTab(tab,btn){

  document.getElementById('tab-requests').style.display =
    tab==='requests' ? 'block':'none';

  document.getElementById('tab-vehicles').style.display =
    tab==='vehicles' ? 'block':'none';

  document.querySelectorAll('.tabs button')
    .forEach(b=>b.classList.remove('active'));

  btn.classList.add('active');

}

/* VEHICLES */

function renderVehicles(){

  document.getElementById('vehicleGrid').innerHTML =
    vehicles.map(v=>`

      <button class="v-btn ${selectedVehicle===v.id?'selected':''}"
      onclick="selectVehicle('${v.id}')">

        <div class="v-title">
          🚗 ${v.name}
        </div>

        <div class="v-meta">
          ${v.seats} plaatsen · ${v.type}
        </div>

      </button>

    `).join('');

}

function selectVehicle(id){

  selectedVehicle = id;

  renderVehicles();

}

function renderVehicleTable(){

  document.getElementById('vehicleTable').innerHTML =
    vehicles.map(v=>`

      <tr>

        <td>${v.id}</td>
        <td>${v.name}</td>
        <td>${v.seats}</td>
        <td>${v.type}</td>

        <td>

          <div style="display:flex;gap:8px;flex-wrap:wrap">

            <button class="btn-small btn-edit"
            onclick="editVehicle('${v.id}')">
              ✏️
            </button>

            <button class="btn-small btn-delete"
            onclick="deleteVehicle('${v.id}')">
              🗑️
            </button>

          </div>

        </td>

      </tr>

    `).join('');

}

function editVehicle(id){

  const v = vehicles.find(x=>x.id===id);

  if(!v) return;

  editingVehicle = id;

  document.getElementById('vId').value = v.id;
  document.getElementById('vName').value = v.name;
  document.getElementById('vSeats').value = v.seats;
  document.getElementById('vType').value = v.type;

}

async function saveVehicle(){

  const id =
    document.getElementById('vId').value.trim();

  const name =
    document.getElementById('vName').value.trim();

  const seats =
    +document.getElementById('vSeats').value;

  const type =
    document.getElementById('vType').value;

  if(!id || !name){

    notify("Vul alles in","error");
    return;

  }

  if(editingVehicle){

    const {error} =
      await sb.from('vehicles')
      .update({name,seats,type})
      .eq('id',editingVehicle);

    if(error){
      notify(error.message,"error");
      return;
    }

    notify("Voertuig aangepast");

  } else {

    const {error} =
      await sb.from('vehicles')
      .insert({id,name,seats,type});

    if(error){
      notify(error.message,"error");
      return;
    }

    notify("Voertuig toegevoegd");

  }

  editingVehicle = null;

  document.getElementById('vId').value='';
  document.getElementById('vName').value='';
  document.getElementById('vSeats').value='5';

  loadData();

}

async function deleteVehicle(id){

  if(!confirm("Voertuig verwijderen?")) return;

  const {error} =
    await sb.from('vehicles')
    .delete()
    .eq('id',id);

  if(error){
    notify(error.message,"error");
    return;
  }

  notify("Voertuig verwijderd");

  loadData();

}

/* REQUESTS */

async function submitRequest(){

  const naam =
    document.getElementById('fNaam').value.trim();

  const email =
    document.getElementById('fEmail').value.trim();

  const date =
    document.getElementById('fDate').value;

  const start =
    document.getElementById('fStart').value;

  const end =
    document.getElementById('fEnd').value;

  const persons =
    +document.getElementById('fPersons').value;

  const reason =
    document.getElementById('fReason').value.trim();

  if(
    !naam ||
    !email ||
    !selectedVehicle ||
    !date ||
    !start ||
    !end ||
    !reason
  ){

    notify("Vul alle velden in","error");
    return;

  }

  const vehicle =
    vehicles.find(v=>v.id===selectedVehicle);

  const {error} =
    await sb.from('requests').insert({

      id:'REQ-'+Date.now(),

      vehicle_id:selectedVehicle,
      vehicle_name:vehicle.name,

      naam,
      email,

      date,

      start_time:start,
      end_time:end,

      persons,
      reason,

      status:'pending'

    });

  if(error){

    notify(error.message,"error");
    return;

  }

  notify("Reservatie aangevraagd");

  loadData();

}

function renderMyRequests(){

  const email =
    document.getElementById('fEmail')?.value?.trim();

  const box =
    document.getElementById('myRequests');

  if(!email){

    box.innerHTML =
      `<p style="color:var(--muted)">Vul uw e-mail in.</p>`;

    return;

  }

  const mine =
    requests.filter(r=>r.email===email);

  box.innerHTML =
    mine.map(r=>requestCard(r,false)).join('');

}

function renderAdminRequests(){

  const box =
    document.getElementById('adminRequests');

  box.innerHTML =
    requests.map(r=>requestCard(r,true)).join('');

}

function requestCard(r,isAdmin){

  const vehicle =
    vehicles.find(v=>v.id===r.vehicle_id);

  const seats =
    vehicle?.seats || 0;

  const free =
    seats - r.persons;

  return `

    <div class="req-card ${r.status}">

      <div class="req-top">

        <div class="req-name">
          🚗 ${r.vehicle_name}
        </div>

        <div class="status ${r.status}">
          ${r.status}
        </div>

      </div>

      <div class="req-meta">

        <div>👤 ${r.naam}</div>
        <div>📧 ${r.email}</div>

        <div>📅 ${r.date}</div>
        <div>🕒 ${r.start_time} → ${r.end_time}</div>

        <div>👥 ${r.persons} personen</div>
        <div>📍 ${r.reason || '-'}</div>

      </div>

      <div class="free-spots">
        🟢 ${free} vrije plaatsen beschikbaar
      </div>

      ${
        isAdmin
        ? `
          <div class="req-actions">

            <button class="btn-small btn-ok"
            onclick="decide('${r.id}','approved')">
              ✅
            </button>

            <button class="btn-small btn-no"
            onclick="decide('${r.id}','rejected')">
              ❌
            </button>

            <button class="btn-small btn-edit"
            onclick="editRequest('${r.id}')">
              ✏️
            </button>

            <button class="btn-small btn-delete"
            onclick="deleteRequest('${r.id}')">
              🗑️
            </button>

          </div>
        `
        : ''
      }

    </div>

  `;

}

/* REQUEST ACTIONS */

async function decide(id,status){

  const {error} =
    await sb.from('requests')
    .update({status})
    .eq('id',id);

  if(error){

    notify(error.message,"error");
    return;

  }

  notify("Reservatie aangepast");

  loadData();

}

async function deleteRequest(id){

  if(!confirm("Reservatie verwijderen?")) return;

  const {error} =
    await sb.from('requests')
    .delete()
    .eq('id',id);

  if(error){

    notify(error.message,"error");
    return;

  }

  notify("Reservatie verwijderd");

  loadData();

}

async function editRequest(id){

  const r = requests.find(x=>x.id===id);

  if(!r) return;

  const reason =
    prompt("Nieuwe locatie / reden", r.reason);

  if(reason === null) return;

  const {error} =
    await sb.from('requests')
    .update({reason})
    .eq('id',id);

  if(error){

    notify(error.message,"error");
    return;

  }

  notify("Reservatie aangepast");

  loadData();

}

/* CALENDAR */

function renderCalendar(){

  const approved =
    requests.filter(r=>r.status==='approved');

  const box =
    document.getElementById('publicCalendar');

  if(!approved.length){

    box.innerHTML =
      `<p style="color:var(--muted)">Nog geen reservaties.</p>`;

    return;

  }

  box.innerHTML =
    approved.map(r=>{

      const vehicle =
        vehicles.find(v=>v.id===r.vehicle_id);

      const seats =
        vehicle?.seats || 0;

      const free =
        seats - r.persons;

      return `

        <div class="req-card approved">

          <div class="req-top">

            <div class="req-name">
              🚗 ${r.vehicle_name}
            </div>

            <div class="status approved">
              Goedgekeurd
            </div>

          </div>

          <div class="req-meta">

            <div>📅 ${r.date}</div>

            <div>
              🕒 ${r.start_time || '-'} → ${r.end_time || '-'}
            </div>

            <div>👤 ${r.naam}</div>

            <div>
              👥 ${r.persons} personen
            </div>

            <div>
              📍 ${r.reason || '-'}
            </div>

            <div>
              📧 ${r.email}
            </div>

          </div>

          <div class="free-spots">
            🟢 ${free} vrije plaatsen beschikbaar voor carpooling
          </div>

        </div>

      `;

    }).join('');

}

/* HELPERS */

function setToday(){

  const t = new Date();

  const date =
    t.getFullYear() + '-' +
    String(t.getMonth()+1).padStart(2,'0') + '-' +
    String(t.getDate()).padStart(2,'0');

  document.getElementById('fDate').value = date;
  document.getElementById('fDate').min = date;

}

let notifTimer;

function notify(msg,type='success'){

  const el =
    document.getElementById('notification');

  el.className =
    `notif ${type}`;

  el.innerHTML = msg;

  el.style.display='block';

  clearTimeout(notifTimer);

  notifTimer = setTimeout(()=>{

    el.style.display='none';

  },4000);

}

</script>
